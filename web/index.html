  "courses": [
    {
      "id": "javascript",
      "name": "JavaScript",
      "lessons": [
        {
          "id": "vars-types",
          "title": "Variables & Types",
          "status": "done",
          "notes": "...",
          "quiz": [{"question":"...","options":["a","b","c","d"],"correct_index":0}],
          "flashcards": [{"front":"...","back":"..."}]
        }
      ]
    }
  ]
}</textarea>
      <div class="btn-grp" style="margin-top:0.4em">
        <button class="btn btn-green" id="jsonImportBtn">▶ Import JSON</button>
        <span id="jsonImportStatus" style="font-size:0.7rem;color:var(--text-dim);align-self:center"></span>
      </div>
      <div style="font-size:0.6rem;color:var(--text-dim);margin-top:0.3em;line-height:1.6">
        <strong>Format:</strong> Course import → <code>{ "courses": [...] }</code> with nested lessons (quiz, coding, flashcards).
        Lesson import → <code>{ "lesson": { "id":"...", "title":"...", ... } }</code> with <code>course_id</code> in parent.
      </div>
    </div>`;
  document.querySelector('.admin-box')?.closest('.admin-editor-panel')?.after(jsonArea);

  // Show/hide course_id input based on import mode
  document.getElementById('jsonImportMode')?.addEventListener('change', () => {
    const mode = document.getElementById('jsonImportMode').value;
    document.getElementById('jsonImportCourseId').style.display = mode === 'lesson' ? '' : 'none';
  });

  // Collapse toggle
  let jsonExpanded = true;
  document.getElementById('jsonImportToggle')?.addEventListener('click', () => {
    jsonExpanded = !jsonExpanded;
    document.getElementById('jsonImportBody').style.display = jsonExpanded ? '' : 'none';
    document.getElementById('jsonImportArrow').textContent = jsonExpanded ? '▼' : '▶';
  });

  // Import button
  document.getElementById('jsonImportBtn')?.addEventListener('click', async () => {
    const raw = document.getElementById('jsonImportTextarea').value.trim();
    if (!raw) { document.getElementById('jsonImportStatus').textContent = '❌ Paste JSON first'; return; }

    let parsed;
    try { parsed = JSON.parse(raw); } catch (e) {
      document.getElementById('jsonImportStatus').textContent = '❌ Invalid JSON: ' + e.message;
      return;
    }

    const mode = document.getElementById('jsonImportMode').value;
    if (mode === 'lesson') {
      const cid = document.getElementById('jsonImportCourseId').value.trim();
      if (cid) parsed.course_id = cid;
      if (!parsed.lesson) {
        document.getElementById('jsonImportStatus').textContent = '❌ For lesson import, JSON must have a "lesson" key';
        return;
      }
    } else if (!parsed.courses) {
      document.getElementById('jsonImportStatus').textContent = '❌ For course import, JSON must have a "courses" array';
      return;
    }

    document.getElementById('jsonImportStatus').textContent = '⏳ Importing...';
    try {
      const res = await fetch('/api/admin/import', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(parsed),
      });
      const result = await res.json();
      if (res.ok) {
        const info = result.courses_imported
          ? result.courses_imported + ' courses, ' + result.lessons_imported + ' lessons'
          : 'lesson: ' + (result.lesson_imported || 'ok');
        document.getElementById('jsonImportStatus').textContent = '✅ Imported: ' + info;
        adminDirty = true;
        await loadAdminTree();
        renderAdminFull(screen);
      } else {
        document.getElementById('jsonImportStatus').textContent = '❌ ' + (result.error || 'import failed');
      }
    } catch (e) {
      document.getElementById('jsonImportStatus').textContent = '❌ Network error: ' + e.message;
    }
  });

  document.getElementById('statusBar').innerHTML = '<span class="prefix">›</span> Admin — content editor with wizard + sync + json';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============ SESSION TIMER ============
let timerState = {
  running: false,
  seconds: 0,
  interval: null,
};

function formatTimer(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function renderTimer() {
  return '<div class="timer-box">' +
    '<span class="tm-display" id="timerDisplay">' + formatTimer(timerState.seconds) + '</span>' +
    '<button class="tm-btn' + (timerState.running ? ' active' : '') + '" id="timerToggle">' + (timerState.running ? '⏸' : '▶') + '</button>' +
    '<button class="tm-btn" id="timerReset">⟳</button>' +
    '<span class="tm-label">focus session</span></div>';
}

function initTimer() {
  const toggle = document.getElementById('timerToggle');
  const reset = document.getElementById('timerReset');
  const display = document.getElementById('timerDisplay');
  if (!toggle || !reset || !display) return;

  toggle.addEventListener('click', () => {
    timerState.running = !timerState.running;
    toggle.textContent = timerState.running ? '⏸' : '▶';
    toggle.classList.toggle('active', timerState.running);
    if (timerState.running) {
      timerState.interval = setInterval(() => {
        timerState.seconds++;
        if (display) display.textContent = formatTimer(timerState.seconds);
      }, 1000);
    } else {
      clearInterval(timerState.interval);
    }
  });

  reset.addEventListener('click', () => {
    timerState.running = false;
    clearInterval(timerState.interval);
    timerState.seconds = 0;
    toggle.textContent = '▶';
    toggle.classList.remove('active');
    if (display) display.textContent = formatTimer(0);
  });
}

// ============ ENHANCED FLASHCARD SCHEDULE (API-backed) ============
const flashcardSchedule = {};

async function initFcSchedule(lessonId) {
  if (!flashcardSchedule[lessonId]) {
    const cards = await api('/api/flashcards/' + lessonId + '/schedule').catch(() => []);
    flashcardSchedule[lessonId] = {
      cards: cards.length ? cards : null,
      current: 0,
      flipped: false,
      ease: 2.5,
      interval: 1,
      reviews: [],
      loaded: true,
    };
  }
}

function getNextReview(lessonId) {
  const s = flashcardSchedule[lessonId];
  if (!s || !s.reviews.length) return 'new';
  const last = s.reviews[s.reviews.length - 1];
  const daysMap = { 1: 'tomorrow', 3: 'in 3 days', 7: 'in 7 days', 30: 'in 30 days', 90: 'in 90 days' };
  return daysMap[s.interval] || 'in ' + s.interval + ' days';
}

async function submitFcReview(lessonId, cardIndex, quality) {
  const res = await fetch('/api/flashcards/' + lessonId + '/review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ card_index: cardIndex, quality: quality }),
  });
  return res.json();
}

// ============ INIT ============
function init() {
  const app = document.getElementById('app');
  const toggle = document.getElementById('widthToggle');
  let wide = localStorage.getItem('tui-wide') === 'true';
  function applyWidth(w) {
    wide = w;
    app.classList.toggle('layout-wide', wide);
    app.classList.toggle('layout-narrow', !wide);
    toggle.textContent = wide ? '[==]' : '[––]';
    localStorage.setItem('tui-wide', wide);
  }
  applyWidth(wide);
  toggle.addEventListener('click', () => applyWidth(!wide));

  document.querySelectorAll('.screen-tab').forEach(el => {
    el.addEventListener('click', () => switchTab(el.dataset.tab));
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.key === 'j') {
      const idx = TABS.indexOf(activeTab);
      if (idx > 0) switchTab(TABS[idx - 1]);
    }
    if (e.key === 'k') {
      const idx = TABS.indexOf(activeTab);
      if (idx < TABS.length - 1) switchTab(TABS[idx + 1]);
    }
  });

  updateStreakWarning();
  markActive();
  switchTab(activeTab);
}

document.addEventListener('DOMContentLoaded', init);
