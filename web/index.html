<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BruteForce Learning</title>
<style>
:root {
  --bg: #0d0d0f; --surface: #111318; --surface-alt: #161820;
  --border: #2a2d3a; --border-dim: #1e2130;
  --text: #c8ccd8; --text-muted: #5a5f72; --text-dim: #3f4252;
  --purple: #9d7dea; --cyan: #4ec9b0; --yellow: #e5c07b;
  --red: #e06c75; --green: #98c379; --blue: #61afef;
  --font-mono: "JetBrains Mono","Fira Code","Cascadia Code","Hack","Courier New",monospace;
  --font-display: "Share Tech Mono","Courier New",monospace;
}
*::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }
html { font-size: clamp(12px, 1.6vh, 28px); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 1rem; line-height: 1.5;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
#app { flex: 1; display: flex; flex-direction: column; min-height: 0; }
#app.layout-wide { max-width: none; }
#app.layout-narrow { max-width: min(86rem, 1100px); }

.title-bar {
  background: #1a1d26; border-bottom: 1px solid var(--border);
  padding: 0.55em 1em; display: flex; align-items: center;
  font-size: 0.95rem; color: var(--text-muted); user-select: none; flex-shrink: 0;
  position: relative;
}
.title-bar .tb-center { margin: 0 auto; }
.title-bar .tb-brand { color: var(--purple); font-weight: bold; }
.title-bar .tb-sub { color: var(--text-dim); font-size: 0.85rem; margin-left: 0.5em; }
.title-bar .tb-toggle {
  position: absolute; right: 1em; top: 50%; transform: translateY(-50%);
  cursor: pointer; font-size: 0.8rem; letter-spacing: 0.08em;
  background: var(--purple); color: #fff; border: none; padding: 0.35em 0.7em;
  font-family: var(--font-mono); text-transform: uppercase; font-weight: bold; line-height: 1;
}

.header-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5em 1.2em; border: 1px solid var(--purple);
  margin: 0.7em 1em 0; flex-shrink: 0;
}
.h-l { color: var(--text-muted); font-size: 0.95rem; }
.h-y { color: var(--yellow); font-weight: bold; }
.h-g { color: var(--green); }
.h-p { color: var(--purple); font-weight: bold; }
.h-s { color: var(--text-dim); }
.h-stat { display: flex; align-items: baseline; gap: 0.3em; font-size: 0.95rem; }

.main-area {
  flex: 1; padding: 0.5em 1em; display: flex; flex-direction: column; min-height: 0; overflow: hidden;
}

.screen-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-dim); flex-shrink: 0;
}
.screen-tab {
  padding: 0.35em 1em; font-size: 0.95rem; color: var(--text-muted);
  cursor: pointer; user-select: none; text-transform: uppercase;
  letter-spacing: 0.06em; border-bottom: 2px solid transparent;
}
.screen-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: bold; }
.screen-tab:hover { color: var(--text); background: #1a1d2e; }
.screen-content { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.keybind-bar {
  border-top: 1px solid var(--border); padding: 0.45em 1em;
  font-size: 0.85rem; display: flex; gap: 0.7em; flex-shrink: 0;
}
.kb-key { color: var(--text); font-weight: bold; }
.kb-action { color: var(--text-muted); }
.kb-pos { color: var(--text-muted); margin-right: auto; }

.status-bar {
  border-top: 1px solid var(--border); padding: 0.3em 1em;
  font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.3em; flex-shrink: 0;
}
.status-bar .prefix { color: var(--text-muted); }

.tab-panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
.tab-panel.active { display: flex; }

.panel {
  border: 1px solid var(--border); position: relative;
  padding: 0.8em;
}
.panel-title {
  position: absolute; top: -0.9em; left: 0.8em; background: var(--bg);
  padding: 0 0.6em; color: var(--purple); font-weight: bold;
  font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.3;
}
.panel-body { padding: 0; }

.stat-4up { display: flex; gap: 0.8em; flex-shrink: 0; }
.stat-card {
  flex: 1; border: 1px solid var(--border); text-align: center;
  padding: 1.5em 0.8em;
}
.stat-card-num { font-family: var(--font-display); font-size: 1.8rem; line-height: 1; }
.stat-card-label {
  font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-top: 0.6em;
}

.dash-unified { display: flex; flex-direction: column; gap: 0.8em; flex: 1; padding: 0.5em 0; }
.dash-u-split { display: flex; gap: 0.8em; flex: 1; min-height: 0; }
.dash-u-left { flex: 1; display: flex; flex-direction: column; gap: 0.8em; min-width: 0; }
.dash-u-right { flex: 1; display: flex; flex-direction: column; gap: 0.8em; min-width: 0; }

.pb-row { display: flex; align-items: center; gap: 0.5em; font-size: 0.95rem; padding: 0.15em 0; }
.pb-label { color: var(--text); width: 20ch; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pb-track { flex: 1; height: 1.1em; position: relative; line-height: 1.1em; letter-spacing: 0.15em; color: var(--border); font-size: 0.95rem; overflow: hidden; }
.pb-fill-text { position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; letter-spacing: 0.15em; }
.pb-pct { text-align: right; font-size: 0.85rem; min-width: 4ch; }
.pb-pct.c0 { color: var(--red); }
.pb-pct.c1 { color: var(--yellow); }
.pb-pct.c2 { color: var(--green); }

.tag-row { display: flex; gap: 0.4em; flex-wrap: wrap; }
.tag {
  font-size: 0.8rem; padding: 0.1em 0.5em; border: 1px solid var(--border-dim);
  color: var(--text-muted); display: flex; align-items: center; gap: 0.4em;
}
.tag .tag-pct { font-weight: bold; color: var(--purple); }
.tag.critical .tag-pct { color: var(--red); }
.tag.warning .tag-pct { color: var(--yellow); }
.tag.ok .tag-pct { color: var(--green); }

.selected-dot { color: var(--purple); }
.mini-feed { display: flex; flex-direction: column; gap: 0.2em; font-size: 0.85rem; }
.mini-feed-item { display: flex; align-items: center; gap: 0.5em; color: var(--text-dim); }
.mini-feed-item .mf-dot { color: var(--green); }
.mini-feed-item .mf-rating { color: var(--yellow); margin-left: auto; }

.si-locked { color: var(--text-dim); }
.si-available { color: var(--text-muted); }
.si-progress { color: var(--yellow); }
.si-done { color: var(--green); }

.tree-split { display: flex; gap: 0.8em; flex: 1; min-height: 0; }
.tree-panel { flex: 0 0 28%; min-width: 16em; display: flex; flex-direction: column; overflow-y: auto; }
.content-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.tree-list { list-style: none; padding: 0.2em 0; }
.tree-item { user-select: none; }
.tree-item-content {
  display: flex; align-items: center; gap: 0.4em;
  padding: 0.2em 0.3em; cursor: pointer; font-size: 0.9rem;
  border-left: 2px solid transparent;
}
.tree-item-content:hover { background: #1a1d2e; }
.tree-item-content.selected { background: #2a1f5a; border-left-color: var(--purple); }
.tree-item-content.sel-course { border-left-color: var(--yellow); }
.tree-item-content.sel-course .ti-name { color: var(--yellow); font-weight: bold; }
.tree-item-content .ti-icon { width: 1.2em; text-align: center; flex-shrink: 0; }
.tree-item-content .ti-name { color: var(--text); }
.tree-item-content .ti-expand { color: var(--text-dim); width: 1em; cursor: pointer; flex-shrink: 0; }
.tree-children { padding-left: 1.2em; }
.tree-leaf .ti-icon { font-size: 0.85rem; }

.roadmap-outer { display: flex; flex-direction: column; gap: 0.5em; flex: 1; }
.rm-header { text-align: center; padding: 0.3em 0; }
.rm-header .rm-course { color: var(--purple); font-weight: bold; font-size: 1.1rem; }
.rm-header .rm-progress { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.2em; }
.rm-progress-bar { width: 100%; height: 0.7em; background: var(--surface-alt); border: 1px solid var(--border-dim); margin: 0.3em 0; }
.rm-progress-bar .rm-pb-fill { height: 100%; background: var(--purple); transition: width 0.3s; }
.rm-current { border: 1px solid var(--purple); padding: 0.8em; position: relative; margin: 0.3em 0; }
.rm-current .rm-curr-label { position: absolute; top: -0.8em; left: 0.8em; background: var(--bg); padding: 0 0.4em; color: var(--yellow); font-weight: bold; font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase; }
.rm-curr-name { color: var(--text); font-weight: bold; font-size: 1rem; }
.rm-curr-desc { color: var(--text-muted); font-size: 0.85rem; margin: 0.2em 0 0.4em; }
.rm-curr-actions { display: flex; gap: 0.5em; }
.rm-btn { background: var(--purple); color: #fff; border: none; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer; font-weight: bold; }
.rm-btn-outline { background: transparent; color: var(--purple); border: 1px solid var(--purple); }
.rm-btn:hover { opacity: 0.85; }

.rmx-panels { display: flex; gap: 0.8em; }
.rmx-panel { flex: 1; border: 1px solid var(--border); padding: 0.6em; position: relative; }
.rmx-panel .rmx-plabel { position: absolute; top: -0.7em; left: 0.6em; background: var(--bg); padding: 0 0.4em; color: var(--text-muted); font-weight: bold; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }

.streak-calendar { display: flex; flex-direction: column; gap: 0.2em; padding: 0.2em 0; }
.sc-header { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; padding: 0 0.2em; }
.sc-header .sc-month { color: var(--text); font-weight: bold; font-size: 0.95rem; }
.sc-header .sc-year { color: var(--text-muted); }
.sc-header .sc-streak { color: var(--yellow); font-weight: bold; }
.sc-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
.sc-table th { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; padding: 0.1em 0; text-align: center; font-weight: normal; }
.sc-table td { text-align: center; padding: 0.35em 0; font-size: 0.9rem; width: 14.28%; border-radius: 2px; border: 1px solid var(--border-dim); }
.sc-table td.sc-day-num { color: var(--text-muted); }
.sc-table td.sc-filled { background: var(--purple); border-color: var(--purple); color: #fff; font-weight: bold; }
.sc-table td.sc-today { border-color: var(--yellow); box-shadow: inset 0 0 0 1px var(--yellow); color: var(--yellow); font-weight: bold; }
.sc-table td.sc-future { color: var(--text-dim); border-color: transparent; }
.sc-legend { display: flex; align-items: center; gap: 0.3em; font-size: 0.65rem; color: var(--text-dim); justify-content: center; margin-top: 0.15em; }
.sc-legend .sc-l-box { width: 0.6em; height: 0.6em; border: 1px solid var(--border-dim); }
.sc-legend .sc-l-box.light { background: var(--purple); opacity: 0.4; border-color: var(--purple); }
.sc-legend .sc-l-box.full { background: var(--purple); border-color: var(--purple); }

.module-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-dim); flex-shrink: 0; }
.module-tab { padding: 0.4em 1em; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; user-select: none; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 0.4em; }
.module-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: bold; }
.module-tab:hover { color: var(--text); background: #1a1d2e; }
.module-container { flex: 1; min-height: 0; overflow-y: auto; position: relative; }
.module-card { padding: 1em; animation: fadeSlide 0.2s ease; }
.module-loading { display: flex; flex-direction: column; gap: 0.8em; padding: 1.5em; }
.skel-line { height: 0.8em; background: var(--surface-alt); border: 1px solid var(--border-dim); animation: skelPulse 1.2s ease-in-out infinite; }
.skel-line.w60 { width: 60%; }
.skel-line.w80 { width: 80%; }
.skel-line.w40 { width: 40%; }
.skel-line.h2 { height: 1.5em; }
.skel-line.h4 { height: 4em; }
@keyframes skelPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

.learn-section { padding: 0.3em 0; }
.learn-section + .learn-section { border-top: 1px solid var(--border-dim); padding-top: 0.6em; margin-top: 0.3em; }
.ls-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4em; }
.ls-body { font-size: 0.9rem; line-height: 1.6; color: var(--text); }
.ls-mnemonic { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5em; }

.quiz-q { font-size: 0.95rem; font-weight: bold; margin-bottom: 0.6em; }
.quiz-opt { display: flex; align-items: center; gap: 0.5em; padding: 0.4em 0.6em; cursor: pointer; font-size: 0.85rem; border: 1px solid var(--border-dim); margin-bottom: 0.3em; transition: border-color 0.15s; }
.quiz-opt:hover { border-color: var(--border); background: #1a1d2e; }
.quiz-opt .qo-letter { color: var(--text-muted); font-weight: bold; min-width: 1.5em; }
.quiz-opt.correct { border-color: var(--green); background: #0f2a1a; }
.quiz-opt.correct .qo-letter { color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: #2a0f0f; }
.quiz-opt.wrong .qo-letter { color: var(--red); }
.quiz-counter { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.3em; }
.quiz-result { font-size: 0.85rem; margin-top: 0.3em; }
.quiz-result.pass { color: var(--green); }
.quiz-result.fail { color: var(--red); }
.quiz-btn { background: var(--purple); color: #fff; border: none; font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer; font-weight: bold; margin-top: 0.5em; }
.quiz-btn:hover { opacity: 0.85; }
.quiz-btn.alt { background: var(--surface-alt); color: var(--text-muted); }

.code-prompt { font-weight: bold; font-size: 0.9rem; margin-bottom: 0.5em; }
.code-editor { background: var(--surface); border: 1px solid var(--border-dim); padding: 0.6em; font-size: 0.85rem; font-family: var(--font-mono); min-height: 5em; white-space: pre-wrap; color: var(--text-dim); margin-bottom: 0.4em; }
.code-out { background: var(--surface-alt); border: 1px solid var(--border-dim); padding: 0.5em; font-size: 0.85rem; margin-top: 0.3em; min-height: 2em; color: var(--text-muted); white-space: pre-wrap; }
.code-out.solution { border-color: var(--purple); color: var(--cyan); }

.fc-card { border: 2px solid var(--border); padding: 2em 1.5em; min-height: 8em; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.1rem; user-select: none; background: var(--surface); transition: border-color 0.2s; }
.fc-card:hover { border-color: var(--purple); }
.fc-card .fc-front { color: var(--text); }
.fc-card .fc-back { color: var(--cyan); }
.fc-card.flipped { border-color: var(--cyan); }
.fc-counter { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 0.4em; }
.fc-hint { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-top: 0.2em; }
.fc-nav { display: flex; gap: 0.5em; justify-content: center; margin-top: 0.6em; }
.fc-btn { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border-dim); font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer; }
.fc-btn:hover { border-color: var(--purple); color: var(--purple); }
.fc-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--border-dim); color: var(--text-dim); }
.fc-empty { color: var(--text-dim); padding: 1em; text-align: center; font-size: 0.9rem; }

.dd-zone { border: 2px dashed var(--border-dim); padding: 1em; min-height: 8em; }
.dd-item { padding: 0.4em 0.6em; border: 1px solid var(--border); margin-bottom: 0.3em; cursor: grab; background: var(--surface); font-size: 0.85rem; }
.dd-item:hover { border-color: var(--purple); }
.dd-item.dragging { opacity: 0.5; }
.dd-item.drag-over { border-color: var(--cyan); }
.dd-slot { border: 1px dashed var(--border-dim); padding: 0.4em 0.6em; margin-bottom: 0.3em; color: var(--text-dim); font-size: 0.75rem; }
.dd-correct { border-color: var(--green) !important; background: #0f2a1a !important; color: var(--green); }
.dd-wrong { border-color: var(--red) !important; background: #2a0f0f !important; color: var(--red); }

.stats-grid { display: flex; flex-direction: column; gap: 0.8em; flex: 1; padding: 0.5em 0; }
.xp-chart { display: flex; align-items: flex-end; gap: 0.3em; height: 5em; padding: 0.3em 0; }
.xp-bar { flex: 1; background: var(--purple); opacity: 0.7; min-height: 0.3em; border-radius: 2px 2px 0 0; }
.xp-bar:hover { opacity: 1; }
.habit-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.habit-cell { aspect-ratio: 1; border: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: var(--text-dim); }
.habit-cell.done { background: var(--purple); border-color: var(--purple); color: #fff; }
.habit-cell.today { border-color: var(--yellow); }

.admin-split { display: flex; gap: 0.6em; flex: 1; min-height: 0; }
.admin-table-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.admin-editor-panel { flex: 2; display: flex; flex-direction: column; min-width: 0; }
.admin-box { border: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
.admin-box .ad-header { padding: 0.3em 0.5em; background: #1a1d26; border-bottom: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.admin-box .ad-body { flex: 1; overflow-y: auto; padding: 0; }
.admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.admin-table th { padding: 0.25em 0.4em; border-bottom: 1px solid var(--border); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: normal; font-size: 0.7rem; text-align: left; }
.admin-table td { padding: 0.2em 0.4em; border-bottom: 1px solid var(--border-dim); color: var(--text); }
.admin-table tr { cursor: pointer; }
.admin-table tr:hover td { background: #1a1d2e; }
.admin-table tr.sel td { background: #2a1f5a; }
.admin-table .ad-depth1 { padding-left: 1em; font-weight: bold; }
.admin-table .ad-depth2 { padding-left: 2em; }

.status-badge { font-size: 0.6rem; padding: 0.05em 0.3em; text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid; display: inline-block; line-height: 1.3; }
.sb-locked { color: var(--text-dim); border-color: var(--border-dim); }
.sb-avail { color: var(--text-muted); border-color: var(--border-dim); }
.sb-prog { color: var(--yellow); border-color: var(--yellow); }
.sb-done { color: var(--green); border-color: var(--green); }

.fld { margin-bottom: 0.6em; }
.fld-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.15em; display: block; }
.fld-input { width: 100%; background: var(--surface); border: 1px solid var(--border-dim); color: var(--text); font-family: var(--font-mono); font-size: 0.8rem; padding: 0.35em 0.5em; outline: none; }
.fld-input:focus { border-color: var(--purple); }
.fld-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border-dim); color: var(--text); font-family: var(--font-mono); font-size: 0.8rem; padding: 0.35em 0.5em; outline: none; min-height: 3em; resize: vertical; }
.fld-textarea:focus { border-color: var(--purple); }
.fld-select { width: 100%; background: var(--surface); border: 1px solid var(--border-dim); color: var(--text); font-family: var(--font-mono); font-size: 0.8rem; padding: 0.35em 0.5em; outline: none; }
.fld-select:focus { border-color: var(--purple); }

.btn { background: var(--purple); color: #fff; border: none; font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.3em 0.6em; cursor: pointer; font-weight: bold; }
.btn:hover { opacity: 0.85; }
.btn-alt { background: transparent; color: var(--purple); border: 1px solid var(--purple); }
.btn-sm { font-size: 0.65rem; padding: 0.2em 0.4em; }
.btn-red { background: var(--red); }
.btn-green { background: var(--green); color: #000; }
.btn-grp { display: flex; gap: 0.3em; align-items: center; }
.btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; padding: 0.1em; }
.btn-icon:hover { color: var(--text); }

.v6-steps { display: flex; align-items: center; gap: 0; margin-bottom: 0.6em; }
.v6-step { display: flex; align-items: center; gap: 0.3em; flex: 1; }
.v6-step.clickable { cursor: pointer; }
.v6-step.clickable:hover .v6-s-num { border-color: var(--purple); color: var(--purple); }
.v6-step.clickable:hover .v6-s-label { color: var(--text); }
.v6-step .v6-s-num { width: 1.5em; height: 1.5em; border-radius: 50%; border: 2px solid var(--border-dim); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: var(--text-dim); flex-shrink: 0; transition: border-color 0.15s, color 0.15s; }
.v6-step.active .v6-s-num { border-color: var(--purple); color: var(--purple); font-weight: bold; }
.v6-step.done .v6-s-num { border-color: var(--green); color: var(--green); }
.v6-step .v6-s-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s; }
.v6-step.active .v6-s-label { color: var(--text); font-weight: bold; }
.v6-step.done .v6-s-label { color: var(--green); }
.v6-step .v6-s-line { flex: 1; height: 1px; background: var(--border-dim); margin: 0 0.4em; }
.v6-step.done .v6-s-line { background: var(--green); }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2em; color: var(--text-dim); text-align: center; }

@keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.report-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2em; padding: 0.1em 0.3em; display: flex; align-items: center; gap: 0.3em; }

/* ===== Streak Loss Warning ===== */
.streak-warning {
  background: #2a1a0f; border: 1px solid var(--yellow); padding: 0.5em 0.8em;
  display: flex; align-items: center; gap: 0.5em; font-size: 0.85rem;
  animation: fadeSlide 0.3s ease;
}
.streak-warning .sw-icon { color: var(--yellow); font-size: 1.2rem; }
.streak-warning .sw-text { color: var(--text); }
.streak-warning .sw-text strong { color: var(--yellow); }

/* ===== Dopamine Menu (reward popup) ===== */
.dopamine-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
  z-index: 100; animation: fadeSlide 0.3s ease;
}
.dopamine-box {
  background: var(--surface); border: 2px solid var(--purple); padding: 1.5em;
  max-width: 30em; width: 90%; text-align: center;
}
.dopamine-box .dm-title { color: var(--yellow); font-weight: bold; font-size: 1.2rem; margin-bottom: 0.3em; }
.dopamine-box .dm-sub { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.8em; }
.dopamine-box .dm-rewards { display: flex; gap: 0.5em; justify-content: center; margin-bottom: 0.8em; }
.dopamine-box .dm-reward {
  flex: 1; border: 1px solid var(--border-dim); padding: 0.6em; cursor: pointer;
  transition: border-color 0.2s;
}
.dm-reward:hover { border-color: var(--purple); }
.dm-reward .dmr-icon { font-size: 1.5rem; display: block; margin-bottom: 0.2em; }
.dm-reward .dmr-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
.dm-reward .dmr-value { font-size: 0.9rem; color: var(--text); font-weight: bold; }
.dopamine-box .dm-claim { margin-top: 0.5em; }
.dopamine-box .dm-skip { margin-top: 0.3em; font-size: 0.75rem; color: var(--text-dim); cursor: pointer; text-decoration: underline; }

/* ===== Leaderboard ===== */
.leaderboard { padding: 0.3em 0; }
.lb-row { display: flex; align-items: center; gap: 0.5em; padding: 0.25em 0.4em; font-size: 0.85rem; }
.lb-row:nth-child(1) { color: var(--yellow); font-weight: bold; }
.lb-row:nth-child(2) { color: var(--text-muted); }
.lb-row:nth-child(3) { color: var(--text-dim); }
.lb-row .lb-rank { min-width: 2ch; text-align: right; color: var(--text-dim); }
.lb-row .lb-name { flex: 1; }
.lb-row .lb-score { color: var(--purple); font-weight: bold; }
.lb-row.lb-you { border: 1px solid var(--purple); background: #2a1f5a; }
.lb-row .lb-ai { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* ===== Micro-commitment banner ===== */
.micro-banner {
  border: 1px solid var(--cyan); padding: 0.4em 0.8em; font-size: 0.8rem;
  display: flex; align-items: center; gap: 0.5em; margin-bottom: 0.4em;
  background: #0a1f1a; animation: fadeSlide 0.5s ease;
}
.micro-banner .mb-icon { color: var(--cyan); }
.micro-banner .mb-text { color: var(--text); }
.micro-banner .mb-text strong { color: var(--cyan); }
.micro-banner .mb-close { margin-left: auto; cursor: pointer; color: var(--text-dim); font-size: 0.8rem; }

/* ===== Session Timer ===== */
.timer-box { display: flex; align-items: center; gap: 0.5em; padding: 0.3em 0; }
.timer-box .tm-display { font-family: var(--font-display); font-size: 1.3rem; color: var(--purple); min-width: 5ch; }
.timer-box .tm-btn { background: var(--surface-alt); border: 1px solid var(--border-dim); color: var(--text); font-family: var(--font-mono); font-size: 0.7rem; padding: 0.2em 0.4em; cursor: pointer; text-transform: uppercase; }
.timer-box .tm-btn:hover { border-color: var(--purple); color: var(--purple); }
.timer-box .tm-btn.active { border-color: var(--green); color: var(--green); }
.timer-box .tm-label { font-size: 0.75rem; color: var(--text-dim); }

/* ===== Daily Checklist ===== */
.checklist { padding: 0.2em 0; }
.cl-item { display: flex; align-items: center; gap: 0.5em; padding: 0.25em 0.3em; font-size: 0.85rem; cursor: pointer; }
.cl-item:hover { background: #1a1d2e; }
.cl-item .cl-cb {
  width: 1em; height: 1em; border: 1px solid var(--border-dim); display: flex;
  align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem;
}
.cl-item.done .cl-cb { border-color: var(--green); color: var(--green); }
.cl-item.done .cl-text { color: var(--text-dim); text-decoration: line-through; }
.cl-item .cl-text { flex: 1; }
.cl-item .cl-xp { font-size: 0.7rem; color: var(--text-muted); }

/* ===== Achievements ===== */
.achievement-grid { display: flex; gap: 0.4em; flex-wrap: wrap; }
.ach-item {
  border: 1px solid var(--border-dim); padding: 0.4em; text-align: center;
  min-width: 6em; flex: 1; opacity: 0.5;
}
.ach-item.unlocked { opacity: 1; border-color: var(--yellow); }
.ach-item .ach-icon { font-size: 1.2rem; display: block; }
.ach-item .ach-name { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2em; }
.ach-item.unlocked .ach-name { color: var(--yellow); }

/* ===== Flashcard review buttons ===== */
.fc-review { display: flex; gap: 0.3em; justify-content: center; margin-top: 0.5em; }
.fc-rbtn { background: var(--surface-alt); border: 1px solid var(--border-dim); font-family: var(--font-mono); font-size: 0.7rem; padding: 0.2em 0.4em; cursor: pointer; text-transform: uppercase; color: var(--text-muted); }
.fc-rbtn:hover { border-color: var(--purple); color: var(--purple); }
.fc-rbtn.hard { color: var(--red); } .fc-rbtn.hard:hover { border-color: var(--red); }
.fc-rbtn.easy { color: var(--green); } .fc-rbtn.easy:hover { border-color: var(--green); }
.fc-rbtn.good { color: var(--cyan); } .fc-rbtn.good:hover { border-color: var(--cyan); }
</style>
</head>
<body>
<div id="app">
  <div class="title-bar">
    <span class="tb-center"><span class="tb-brand">BruteForce Learning</span> <span class="tb-sub">— TUI Learning Platform</span></span>
    <button class="tb-toggle" id="widthToggle">[––]</button>
  </div>

  <div class="header-bar" id="headerBar">
    <div class="h-stat"><span class="h-l">streak</span> <span class="h-y" id="headerStreak">10d</span></div>
    <div class="h-stat"><span class="h-l">xp today</span> <span class="h-p" id="headerXp">450</span><span class="h-s">/</span><span class="h-l" id="headerXpMax">600</span></div>
    <div class="h-stat"><span class="h-l">mastery</span> <span class="h-g" id="headerMastery">73%</span></div>
    <div class="h-stat"><span class="h-l">power</span> <span class="h-p" id="headerPower">--</span></div>
  </div>

  <div class="main-area">
    <div class="screen-tabs" id="tabs">
      <div class="screen-tab active" data-tab="learn">Learn</div>
      <div class="screen-tab" data-tab="progress">Progress</div>
      <div class="screen-tab" data-tab="admin">Admin</div>
    </div>
    <div class="screen-content" id="screenContent"></div>
  </div>

  <div class="keybind-bar" id="keybindBar">
    <span class="kb-pos" id="kbPos">Dashboard</span>
    <span class="kb-key">j/k</span><span class="kb-action"> navigate tabs</span>
  </div>
  <div class="status-bar" id="statusBar">
    <span class="prefix">›</span> Ready — all systems online
  </div>
</div>

<div id="dopamineOverlay" class="dopamine-overlay" style="display:none">
  <div class="dopamine-box">
    <div class="dm-title" id="dmTitle">🎉 Reward!</div>
    <div class="dm-sub" id="dmSub">You completed a lesson. Claim your reward:</div>
    <div class="dm-rewards" id="dmRewards"></div>
    <div class="dm-claim"><button class="btn" id="dmClaimBtn">Claim & Continue</button></div>
    <div class="dm-skip" id="dmSkip">Skip</div>
  </div>
</div>

<script>
const LS_PREFIX = 'bfl_';

function persist(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); } catch {}
}
function restore(key, def) {
  try { const v = localStorage.getItem(LS_PREFIX + key); return v !== null ? JSON.parse(v) : def; } catch { return def; }
}

const TABS = ['learn', 'progress', 'admin'];
let activeTab = restore('activeTab', 'learn');

// ============ API ============
async function api(path) {
  const res = await fetch(path);
  return res.json();
}

// ============ TABS ============
function switchTab(tab) {
  activeTab = tab;
  persist('activeTab', tab);
  document.querySelectorAll('.screen-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.getElementById('kbPos').textContent = tab.charAt(0).toUpperCase() + tab.slice(1);
  if (tab === 'learn') {
    if (adminDirty || learnDirty) {
      treeLoaded = false;
      learnDirty = false;
      adminDirty = false;
    }
  }
  renderTab(tab);
}

function renderTab(tab) {
  const screen = document.getElementById('screenContent');
  switch (tab) {
    case 'learn': renderLearn(screen); break;
    case 'progress': renderProgress(screen); break;
    case 'admin': renderAdmin(screen); break;
  }
}

// ============ DASHBOARD ============
async function renderDashboard(screen) {
  const [stats, ps] = await Promise.all([
    api('/api/progress').catch(() => ({ problems: 18, streak: 5, mastery: 42, solved: 18, xp: 320, xpMax: 500 })),
    api('/api/powerscore').catch(() => ({ power_score: 0 })),
  ]);
  document.getElementById('headerStreak').textContent = stats.streak + 'd';
  document.getElementById('headerXp').textContent = stats.xp;
  document.getElementById('headerXpMax').textContent = stats.xpMax;
  document.getElementById('headerMastery').textContent = stats.mastery + '%';
  document.getElementById('headerPower').textContent = ps.power_score;

  const streakWarning = getStreakWarning();

  screen.innerHTML = `<div class="tab-panel active">
    <div class="dash-unified">
      ${streakWarning}
      <div class="stat-4up">
        <div class="stat-card"><div class="stat-card-num" style="color:var(--yellow)">${stats.problems}</div><div class="stat-card-label">Problems</div></div>
        <div class="stat-card"><div class="stat-card-num" style="color:var(--purple)">${stats.streak}d</div><div class="stat-card-label">Streak</div></div>
        <div class="stat-card"><div class="stat-card-num" style="color:var(--cyan)">${stats.mastery}%</div><div class="stat-card-label">Mastery</div></div>
        <div class="stat-card"><div class="stat-card-num" style="color:var(--green)">${stats.solved}</div><div class="stat-card-label">Solved</div></div>
      </div>
      <div class="dash-u-split">
        <div class="dash-u-left">
          <div class="panel" style="flex:1;display:flex;flex-direction:column">
            <div class="panel-title">Progress</div>
            <div class="panel-body" style="padding:0.15em 0;flex:1">
              <div class="pb-row"><span class="pb-label">data structures</span><div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:0%;color:var(--red)"></span></div><span class="pb-pct c0">0%</span></div>
              <div class="pb-row"><span class="pb-label">graphs</span><div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:40%;color:var(--cyan)">████████████</span></div><span class="pb-pct c1">40%</span></div>
              <div class="pb-row"><span class="pb-label">dynamic programming</span><div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:65%;color:var(--yellow)">████████████████████</span></div><span class="pb-pct c1">65%</span></div>
              <div class="pb-row"><span class="pb-label">math</span><div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:90%;color:var(--green)">████████████████████████████</span></div><span class="pb-pct c2">90%</span></div>
            </div>
          </div>
          <div class="panel" style="flex-shrink:0">
            <div class="panel-title">Topics</div>
            <div class="panel-body tag-row" style="padding:0.4em">
              <span class="tag critical"><span>data structures</span> <span class="tag-pct">0%</span></span>
              <span class="tag critical"><span>graphs</span> <span class="tag-pct">40%</span></span>
              <span class="tag warning"><span>dynamic programming</span> <span class="tag-pct">65%</span></span>
              <span class="tag ok"><span>math</span> <span class="tag-pct">90%</span></span>
              <span class="tag critical"><span>sortings</span> <span class="tag-pct">25%</span></span>
              <span class="tag warning"><span>bfs</span> <span class="tag-pct">50%</span></span>
            </div>
          </div>
        </div>
        <div class="dash-u-right">
          <div class="panel">
            <div class="panel-title">Continue</div>
            <div class="panel-body" style="padding:0.3em 0.4em">
              <div style="display:flex;align-items:center;gap:0.4em;margin-bottom:0.3em">
                <span class="selected-dot">►</span>
                <span style="color:var(--purple);font-weight:bold">React → JS Basics</span>
              </div>
              <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.4em">Closures — 0% complete</div>
              <div style="display:flex;align-items:center;gap:0.4em">
                <span style="font-size:0.85rem;color:var(--text-muted)">65%</span>
                <div style="flex:1;height:0.5em;background:var(--surface-alt);border:1px solid var(--border-dim)"><div style="width:65%;height:100%;background:var(--purple)"></div></div>
              </div>
            </div>
          </div>
          <div class="panel" style="flex:1">
            <div class="panel-title">Leaderboard</div>
            <div class="panel-body" style="padding:0.2em 0.4em">${renderLeaderboard()}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('statusBar').innerHTML = '<span class="prefix">›</span> Dashboard — stats, progress, leaderboard';
}

// ============ DATA (shared) ============
let TREE_DATA = [];
let treeLoaded = false;

async function loadTreeData() {
  const data = await api('/api/courses').catch(() => []);
  TREE_DATA = data;
  treeLoaded = true;
  return data;
}

const STAT_ICONS = { locked: '◌', available: '○', in_progress: '▶', done: '●' };
const STAT_CLS = { locked: 'si-locked', available: 'si-available', in_progress: 'si-progress', done: 'si-done' };

function findNode(id, nodes) {
  nodes = nodes || TREE_DATA;
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(id, n.children); if (f) return f; }
  }
  return null;
}

function isCourseNode(node) { return node && node.children && node.children.length > 0; }

function getAllNodeIds(nodes) {
  let ids = [];
  for (const n of nodes) {
    ids.push(n.id);
    if (n.children) ids = ids.concat(getAllNodeIds(n.children));
  }
  return ids;
}
function refreshAllNodeIds() {
  ALL_NODE_IDS.length = 0;
  ALL_NODE_IDS.push(...getAllNodeIds(TREE_DATA));
}
let ALL_NODE_IDS = [];

function getCurrentLesson(course) {
  if (!course || !course.children) return null;
  return course.children.find(c => c.status === 'in_progress') ||
         course.children.find(c => c.status === 'available') ||
         course.children[0] || null;
}

function renderTree(nodes, depth, selId) {
  let html = '<ul class="tree-list">';
  for (const n of nodes) {
    const hasChildren = n.children && n.children.length > 0;
    const isSel = n.id === selId;
    const selCls = isSel ? (hasChildren ? ' sel-course' : ' selected') : '';
    html += '<li class="tree-item' + (!hasChildren ? ' tree-leaf' : '') + '">';
    html += '<div class="tree-item-content' + selCls + '" data-id="' + n.id + '">';
    if (hasChildren) {
      html += '<span class="ti-expand" data-toggle="' + n.id + '">' + (n.expanded ? '▼' : '▶') + '</span>';
    } else {
      html += '<span class="ti-expand" style="visibility:hidden">▶</span>';
    }
    html += '<span class="ti-icon">' + (n.children
      ? (n.status === 'done' ? '<span class="si-done">●</span>' : n.status === 'in_progress' ? '<span class="si-progress">▶</span>' : '<span class="si-locked">◌</span>')
      : `<span class="${STAT_CLS[n.status]}">${STAT_ICONS[n.status]}</span>`) + '</span>';
    html += '<span class="ti-name">' + n.name + '</span>';
    html += '</div>';
    if (hasChildren && n.expanded) {
      html += '<div class="tree-children">' + renderTree(n.children, depth + 1, selId) + '</div>';
    }
    html += '</li>';
  }
  html += '</ul>';
  return html;
}

function renderStreakCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const today = now.getDate();
  let html = '<div class="streak-calendar">';
  html += '<div class="sc-header">';
  html += '<span class="sc-month">' + now.toLocaleString('en', { month: 'long' }) + '</span>';
  html += '<span class="sc-year">' + year + '</span>';
  html += '<span class="sc-streak">🔥 10d streak</span></div>';
  html += '<table class="sc-table"><tr>';
  for (const h of ['S','M','T','W','T','F','S']) html += '<th>' + h + '</th>';
  html += '</tr>';
  let day = 1;
  for (let w = 0; w < 6; w++) {
    html += '<tr>';
    for (let d = 0; d < 7; d++) {
      if ((w === 0 && d < firstDay) || day > daysInMonth) { html += '<td></td>'; }
      else {
        let cls = 'sc-day-num';
        if (day === today) cls += ' sc-today';
        else if (day < today) cls += ' sc-filled';
        else cls += ' sc-future';
        html += '<td class="' + cls + '">' + day + '</td>';
        day++;
      }
    }
    html += '</tr>';
    if (day > daysInMonth) break;
  }
  html += '</table>';
  html += '<div class="sc-legend"><span class="sc-l-box light"></span><span>done</span><span class="sc-l-box full"></span><span>today</span></div></div>';
  return html;
}

// ============ LEARN ============
let learnState = { selectedNodeId: restore('learnSelected', null), activeModule: restore('learnModule', 'learn') };
let learnDirty = false;

async function renderLearn(screen) {
  if (!treeLoaded) await loadTreeData();
  refreshAllNodeIds();
  if (!learnState.selectedNodeId && TREE_DATA.length > 0) {
    learnState.selectedNodeId = TREE_DATA[0].id;
  }
  if (learnState.selectedNodeId) persist('learnSelected', learnState.selectedNodeId);
  const node = findNode(learnState.selectedNodeId);
  const isCourse = isCourseNode(node);
  let html = '<div class="tab-panel active"><div class="tree-split">';

  html += '<div class="tree-panel"><div class="panel" style="height:100%;display:flex;flex-direction:column">';
  html += '<div class="panel-title">Courses</div>';
  html += '<div class="panel-body" style="overflow-y:auto;flex:1">';
  html += renderTree(TREE_DATA, 0, learnState.selectedNodeId);
  html += '</div></div></div>';

  html += '<div class="panel" style="flex:1;display:flex;flex-direction:column;min-width:0">';
  if (isCourse) {
    const current = getCurrentLesson(node);
    const children = node.children || [];
    const done = children.filter(c => { if (c.children) return c.children.every(cc => cc.status === 'done'); return c.status === 'done'; }).length;
    const total = children.length;
    const pct = total ? Math.round(done / total * 100) : 0;

    html += '<div class="panel-body" style="overflow-y:auto;flex:1;padding:0.2em 0.4em">';
    html += '<div class="roadmap-outer">';
    html += '<div class="rm-header"><div class="rm-course">' + node.name + '</div>';
    html += '<div class="rm-progress">' + done + '/' + total + ' lessons · ' + pct + '%</div>';
    html += '<div class="rm-progress-bar"><div class="rm-pb-fill" style="width:' + pct + '%"></div></div></div>';

    if (current) {
      html += '<div class="rm-current"><div class="rm-curr-label">Continue</div>';
      html += '<div class="rm-curr-name">' + current.name + '</div>';
      html += '<div class="rm-curr-desc">' + (current.type === 'lesson' ? 'Read notes and complete the quiz' : 'Write code to solve the challenge') + '</div>';
      html += '<div class="rm-curr-actions">';

function bindLearnEvents() {

    el.addEventListener('click', (e) => {

      persist('learnSelected', id);
      renderLearn(document.getElementById('screenContent'));
    });

async function loadLearnModule(lessonId) {
  const container = document.getElementById('learnModule');
  if (!container) return;
  try {
    let html = '<div class="module-card">';
    switch (learnState.activeModule) {
      case 'learn':
        const lesson = await api('/api/lessons/' + lessonId);
        html += '<div class="learn-section"><div class="ls-label">Notes</div><div class="ls-body">' + (lesson.notes || 'Content coming soon.') + '</div>';
        if (lesson.mnemonic) html += '<div class="ls-mnemonic">🧠 ' + lesson.mnemonic + '</div>';
        html += '</div><div class="learn-section"><div class="ls-label">Review Schedule</div>';
        initFcSchedule(lessonId);
        const nextReview = getNextReview(lessonId);
        html += '<div class="ls-body" style="color:var(--text-muted);font-size:0.85rem">Next review: <span style="color:var(--yellow)">' + nextReview + '</span> · Ease: <span style="color:var(--cyan)">' + (flashcardSchedule[lessonId]?.ease || 2.5).toFixed(1) + '</span></div></div>';
        break;

      case 'quiz':
        const questions = await api('/api/lessons/' + lessonId + '/quiz');
        if (!questions.length) {
          html += '<div class="fc-empty">No quiz questions for this lesson.</div>';
        } else {
          if (!quizState[lessonId]) quizState[lessonId] = { current: 0, answers: {}, done: false };
          const s = quizState[lessonId];
          const q = questions[s.current];
          html += '<div class="quiz-counter">Q' + (s.current + 1) + '/' + questions.length + '</div>';
          html += '<div class="quiz-q">' + q.question + '</div>';
          const letters = ['A', 'B', 'C', 'D'];
          for (let i = 0; i < q.options.length; i++) {
            let cls = 'quiz-opt';
            if (s.answers[s.current] !== undefined) {
              if (i === q.correct_index) cls += ' correct';
              else if (s.answers[s.current] === i) cls += ' wrong';
            }
            html += '<div class="' + cls + '" data-idx="' + i + '"><span class="qo-letter">' + letters[i] + '</span><span>' + q.options[i] + '</span></div>';
          }
          if (s.answers[s.current] === undefined) {
            html += '<div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3em">Select an answer</div>';
          } else {
            const ok = q.correct_index === s.answers[s.current];
            html += '<div class="quiz-result ' + (ok ? 'pass' : 'fail') + '">' + (ok ? '✓ Correct' : '✗ Answer: ' + q.options[q.correct_index]) + '</div>';
            if (s.current < questions.length - 1) html += '<button class="quiz-btn" data-action="quiz-next">Next →</button>';
            else html += '<button class="quiz-btn" data-action="quiz-done">Score</button>';
          }
        }
        break;

      case 'code': {
        const codingData = await api('/api/lessons/' + lessonId + '/coding').catch(() => null);
        const e = codingData && codingData.prompt ? codingData : null;
        if (!e) { html += '<div class="fc-empty">No coding exercise for this lesson.</div>'; break; }
        if (!codeState[lessonId]) codeState[lessonId] = { output: '', showSolution: false };
        const s = codeState[lessonId];
        html += '<div class="code-prompt">' + e.prompt + '</div>';
        html += '<div class="code-editor" contenteditable="true" id="codeEditor">' + e.starter + '<span style="animation:blink 1s step-end infinite">_</span></div>';
        html += '<button class="quiz-btn" data-action="code-run">▶ Run</button>';
        html += '<button class="quiz-btn alt" data-action="code-reveal">' + (s.showSolution ? 'Hide' : 'Reveal') + '</button>';
        if (s.output) html += '<div class="code-out">' + s.output + '</div>';
        if (s.showSolution) html += '<div class="code-out solution">// Solution<br>' + e.solution.replace(/\n/g, '<br>') + '</div>';
        break;
      }

      case 'flashcards': {
        await initFcSchedule(lessonId);
        const s = flashcardSchedule[lessonId];
        const cards = s ? s.cards : null;
        if (!cards || !cards.length) { html += '<div class="fc-empty">No flashcards for this lesson.</div>'; break; }
        const card = cards[s.current];
        html += '<div class="fc-counter">Card ' + (s.current + 1) + '/' + cards.length + '</div>';
        html += '<div style="font-size:0.7rem;color:var(--text-dim);text-align:center;margin-bottom:0.3em">Ease: <span style="color:var(--cyan)">' + (card.ease || 2.5).toFixed(1) + '</span></div>';
        html += '<div class="fc-card' + (s.flipped ? ' flipped' : '') + '" data-action="fc-flip">';
        html += s.flipped ? '<div class="fc-back">' + card.back + '</div>' : '<div class="fc-front">' + card.front + '</div><div class="fc-hint">[click to reveal]</div>';
        html += '</div>';
        if (s.flipped) {
          html += '<div class="fc-review">';
          html += '<button class="fc-rbtn hard" data-fc-rate="1">Hard</button>';
          html += '<button class="fc-rbtn good" data-fc-rate="3">Good</button>';
          html += '<button class="fc-rbtn easy" data-fc-rate="5">Easy</button>';
          html += '</div>';
        }
        html += '<div class="fc-nav">';
        html += '<button class="fc-btn" data-action="fc-prev"' + (s.current === 0 ? ' disabled' : '') + '>◀ Prev</button>';
        html += '<button class="fc-btn" data-action="fc-next"' + (s.current === cards.length - 1 ? ' disabled' : '') + '>Next ▶</button>';
        html += '</div>';
        break;
      }
    }
    html += '</div>';
    container.innerHTML = html;
    bindModuleActions(lessonId);
    bindMicroBanners();
  } catch (e) {
    container.innerHTML = '<div class="module-card" style="color:var(--red)">Error loading module.</div>';
  }
}

let quizState = {};
let codeState = {};
let fcState = {};

function bindModuleActions(lessonId) {
  document.querySelectorAll('.quiz-opt').forEach(el => {
    el.addEventListener('click', () => {
      if (quizState[lessonId] && quizState[lessonId].answers[quizState[lessonId].current] === undefined) {
        quizState[lessonId].answers[quizState[lessonId].current] = parseInt(el.dataset.idx);
        loadLearnModule(lessonId);
      }
    });
  });

  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      if (action === 'quiz-next' && quizState[lessonId]) { quizState[lessonId].current++; loadLearnModule(lessonId); }
      else if (action === 'quiz-done' && quizState[lessonId]) {
        quizState[lessonId].done = true;
        loadLearnModule(lessonId);
        setTimeout(() => showDopamineMenu('quiz'), 300);
        markActive();
      }
      else if (action === 'quiz-retry' && quizState[lessonId]) { quizState[lessonId] = { current: 0, answers: {}, done: false }; loadLearnModule(lessonId); }
      else if (action === 'code-run') {
        if (codeState[lessonId]) { codeState[lessonId].output = '<span style="color:var(--green)">✓ Code runs (simulated)</span>'; loadLearnModule(lessonId); }
      }
      else if (action === 'code-reveal' && codeState[lessonId]) { codeState[lessonId].showSolution = !codeState[lessonId].showSolution; loadLearnModule(lessonId); }
      else if (action === 'fc-flip') {
        initFcSchedule(lessonId);
        if (flashcardSchedule[lessonId]) { flashcardSchedule[lessonId].flipped = !flashcardSchedule[lessonId].flipped; loadLearnModule(lessonId); }
      }
      else if (action === 'fc-next') {
        initFcSchedule(lessonId);
        const s = flashcardSchedule[lessonId];
        if (s && s.current < s.cards.length - 1) { s.current++; s.flipped = false; loadLearnModule(lessonId); }
      }
      else if (action === 'fc-prev') {
        initFcSchedule(lessonId);
        const s = flashcardSchedule[lessonId];
        if (s && s.current > 0) { s.current--; s.flipped = false; loadLearnModule(lessonId); }
      }
      if (['quiz-next', 'code-run'].includes(action)) markActive();
    });
  });

  document.querySelectorAll('[data-fc-rate]').forEach(el => {
    el.addEventListener('click', async () => {
      const rate = parseInt(el.dataset.fcRate);
      await initFcSchedule(lessonId);
      const s = flashcardSchedule[lessonId];
      if (!s) return;

      const result = await submitFcReview(lessonId, s.current, rate);
      s.reviews.push({ date: new Date().toISOString(), rating: rate, result: result });

      // Update XP from header (server already awarded XP)
      const resp = await api('/api/progress');
      document.getElementById('headerXp').textContent = resp.xp;

      if (s.current < s.cards.length - 1) {
        s.current++;
        s.flipped = false;
        loadLearnModule(lessonId);
      } else {
        setTimeout(() => showDopamineMenu('quiz'), 200);
        markActive();
      }
    });
  });
}

function setupCodePlay(exData) {
  let currentEx = Object.keys(exData)[0];
  let showSolution = false;

  function loadExercise(name) {
    currentEx = name;
    const ex = exData[name];
    document.getElementById('codePrompt').textContent = ex.prompt;
    document.getElementById('codePlayEditor').innerHTML = ex.starter + '<span style="animation:blink 1s step-end infinite">_</span>';
    document.getElementById('codePlayOutput').innerHTML = '';
    showSolution = false;

    // Setup drag & drop for this exercise
    const correctOrder = ex.solution.split('\n').filter(l => l.trim());
    // Shuffle the lines for drag & drop
    const shuffled = [...correctOrder].sort(() => Math.random() - 0.5);
    const zone = document.getElementById('dragDropZone');
    zone.innerHTML = '<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.3em">Arrange in correct order:</div>';
    shuffled.forEach((line, i) => {
      zone.innerHTML += '<div class="dd-item" draggable="true" data-original="' + line.replace(/"/g, '&quot;') + '">' + line + '</div>';
    });

    // Drag & drop handlers
    let draggedEl = null;
    zone.querySelectorAll('.dd-item').forEach(item => {
      item.addEventListener('dragstart', () => { draggedEl = item; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => { item.classList.remove('dragging'); });
      item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
      item.addEventListener('dragleave', () => { item.classList.remove('drag-over'); });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (draggedEl && draggedEl !== item) {
          const parent = zone;
          const items = [...parent.querySelectorAll('.dd-item')];
          const fromIdx = items.indexOf(draggedEl);
          const toIdx = items.indexOf(item);
          if (fromIdx < toIdx) { parent.insertBefore(draggedEl, item.nextSibling); }
          else { parent.insertBefore(draggedEl, item); }
        }
      });
    });
  }

  document.getElementById('codeExerciseSelect').addEventListener('change', (e) => loadExercise(e.target.value));
  document.getElementById('codePlayRun').addEventListener('click', () => {
    const editor = document.getElementById('codePlayEditor');
    const code = editor.textContent || editor.innerText;
    try {
      const result = new Function(code)();
      document.getElementById('codePlayOutput').innerHTML = '<div class="code-out"><span style="color:var(--green)">✓ Output: </span>' + (result !== undefined ? result : 'undefined') + '</div>';
    } catch (err) {
      document.getElementById('codePlayOutput').innerHTML = '<div class="code-out"><span style="color:var(--red)">✗ Error: </span>' + err.message + '</div>';
    }
  });
  document.getElementById('codePlayReveal').addEventListener('click', () => {
    const ex = exData[currentEx];
    showSolution = !showSolution;
    document.getElementById('codePlayOutput').innerHTML = showSolution
      ? '<div class="code-out solution">// Solution<br>' + ex.solution.replace(/\n/g, '<br>') + '</div>'
      : '';
    document.getElementById('codePlayReveal').textContent = showSolution ? 'Hide' : 'Reveal';
  });
  document.getElementById('codePlayReset').addEventListener('click', () => loadExercise(currentEx));

  loadExercise(currentEx);
}

    html += '<span style="font-size:0.6rem;color:var(--text-dim)">' + days[i] + '</span></div>';
  }
  html += '</div></div></div>';

  // Achievements
  html += '<div class="panel"><div class="panel-title">Achievements</div><div class="panel-body" style="padding:0.4em">' + renderAchievements() + '</div></div>';

  // Enhanced habit calendar
  html += '<div class="panel"><div class="panel-title">Activity Calendar</div><div class="panel-body" style="padding:0.4em">';
  html += '<div style="display:flex;gap:0.5em;margin-bottom:0.5em">';
  html += '<span class="tag ok"><span>🔥 ' + stats.streak + ' day streak</span></span>';
  html += '<span class="tag"><span>⏱ ' + stats.total_hours + 'h total</span></span></div>';
  html += renderStreakCalendar();
  html += '</div></div>';

  // Strengths & Weaknesses report
  const weak = stats.topics.filter(t => t.progress < 40);
  const medium = stats.topics.filter(t => t.progress >= 40 && t.progress < 70);
  const strong = stats.topics.filter(t => t.progress >= 70);

  html += '<div class="panel" style="flex:1"><div class="panel-title">Topic Report</div><div class="panel-body" style="padding:0.3em 0">';

  if (weak.length > 0) {
    html += '<div style="font-size:0.75rem;color:var(--red);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.2em;padding:0 0.3em">🔴 Weak — Needs Focus</div>';
    for (const t of weak) {
      html += '<div class="pb-row"><span class="pb-label">' + t.name + '</span>';
      html += '<div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:' + t.progress + '%;color:var(--red)">' + '█'.repeat(Math.floor(t.progress / 3)) + '</span></div>';
      html += '<span class="pb-pct c0">' + t.progress + '%</span></div>';
    }
  }

  if (medium.length > 0) {
    html += '<div style="font-size:0.75rem;color:var(--yellow);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.2em;margin-top:0.4em;padding:0 0.3em">🟡 Medium — Improving</div>';
    for (const t of medium) {
      html += '<div class="pb-row"><span class="pb-label">' + t.name + '</span>';
      html += '<div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:' + t.progress + '%;color:var(--yellow)">' + '█'.repeat(Math.floor(t.progress / 3)) + '</span></div>';
      html += '<span class="pb-pct c1">' + t.progress + '%</span></div>';
    }
  }

  if (strong.length > 0) {
    html += '<div style="font-size:0.75rem;color:var(--green);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.2em;margin-top:0.4em;padding:0 0.3em">🟢 Strong — Mastered</div>';
    for (const t of strong) {
      html += '<div class="pb-row"><span class="pb-label">' + t.name + '</span>';
      html += '<div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:' + t.progress + '%;color:var(--green)">' + '█'.repeat(Math.floor(t.progress / 3)) + '</span></div>';
      html += '<span class="pb-pct c2">' + t.progress + '%</span></div>';
    }
  }

  html += '</div></div></div></div>';

  screen.innerHTML = html;
  document.getElementById('statusBar').innerHTML = '<span class="prefix">›</span> Progress — timer, checklist, XP, achievements, habits, topics';
  initTimer();
  bindChecklist();
}

// ============ ADMIN ============
let adminData = [];
let adminSelId = restore('adminSel', null);
let adminStep = restore('adminStep', 1);
let adminForm = null;
let adminDirty = false;

async function loadAdminTree() {
  adminData = await api('/api/admin/courses').catch(() => []);
}

async function loadAdminLesson(id) {
  const data = await api('/api/admin/lessons/' + id).catch(() => null);
  if (data) {
    adminForm = {
      title: data.title || '',
      type: data.type || 'lesson',
      status: data.status || 'locked',
      notes: data.notes || '',
      mnemonic: data.mnemonic || '',
      course_id: data.course_id || '',
      quiz: Array.isArray(data.quiz) ? data.quiz : [],
      coding: data.coding && data.coding.prompt ? data.coding : { prompt: '', starter: '', solution: '' },
      flashcards: Array.isArray(data.flashcards) ? data.flashcards : [],
    };
  }
  adminStep = 1;
}

function badge(s) {
  if (!s) return '';
  const cls = s === 'locked' ? 'sb-locked' : s === 'available' ? 'sb-avail' : s === 'in_progress' ? 'sb-prog' : s === 'done' ? 'sb-done' : 'sb-locked';
  return '<span class="status-badge ' + cls + '">' + s.replace('_', ' ') + '</span>';
}

function flattenTree(nodes) {
  let list = [];
  for (const n of nodes) {
    list.push(n);
    if (n.children) list = list.concat(flattenTree(n.children));
  }
  return list;
}

async function renderAdmin(screen) {
  await loadAdminTree();
  if (adminSelId && !flattenTree(adminData).find(n => n.id === adminSelId)) {
    adminSelId = null;
    persist('adminSel', null);
  }
  renderAdminFull(screen);
}

function renderAdminFull(screen) {
  const all = flattenTree(adminData);
  const sel = all.find(n => n.id === adminSelId);
  const isLeaf = sel && sel.type && sel.type !== 'course';

  let h = '<div class="tab-panel active"><div class="admin-split">';

  // Table
  h += '<div class="admin-table-panel"><div class="admin-box"><div class="ad-header">Content Tree</div><div class="ad-body">';
  h += '<table class="admin-table"><tr><th>Name</th><th>Type</th><th>Status</th></tr>';
  for (const n of all) {
    const depth = n.type === 'course' ? 1 : 2;
    h += '<tr class="' + (n.id === adminSelId ? 'sel' : '') + '" data-adm-id="' + n.id + '">';
    h += '<td class="ad-depth' + depth + '">' + (n.name || n.id) + '</td>';
    h += '<td style="font-size:0.7rem;color:var(--text-dim)">' + (n.type || 'course') + '</td>';
    h += '<td>' + badge(n.status) + '</td></tr>';
  }
  h += '</table>';
  // Tree action buttons
  h += '<div class="btn-grp" style="padding:0.3em">';
  h += '<button class="btn btn-sm" id="admAddLesson">+ Lesson</button>';
  h += '<button class="btn btn-sm btn-alt" id="admAddCourse">+ Course</button>';
  if (adminSelId) h += '<button class="btn btn-sm btn-red" id="admDeleteNode">✕ Delete</button>';
  h += '</div></div></div></div>';

  // Editor
  h += '<div class="admin-editor-panel"><div class="admin-box"><div class="ad-header">' + (sel ? (sel.name || sel.id) : 'Select a node') + '</div><div class="ad-body" style="padding:0.5em;overflow-y:auto">';

  if (sel && isLeaf && adminForm) {
    const infoFilled = adminForm.title && adminForm.title.trim().length > 0;

    // Wizard steps (clickable if info is filled)
    h += '<div class="v6-steps">';
    for (let i = 1; i <= 5; i++) {
      const cls = adminStep === i ? 'active' : adminStep > i ? 'done' : '';
      const labels = ['Info', 'Notes', 'Quiz', 'Coding', 'Flashcards'];
      const clickable = i === 1 || (i > 1 && infoFilled) ? ' clickable' : '';
      h += '<div class="v6-step ' + cls + clickable + '" data-adm-goto="' + i + '"><span class="v6-s-num">' + i + '</span><span class="v6-s-label">' + labels[i - 1] + '</span>';
      if (i < 5) h += '<span class="v6-s-line"></span>';
      h += '</div>';
    }
    h += '</div>';

    if (!infoFilled && adminStep > 1) {
      adminStep = 1;
    }

    switch (adminStep) {
      case 1:
        h += '<div class="fld"><label class="fld-label">Title *</label><input class="fld-input" id="admFldTitle" value="' + escHtml(adminForm.title) + '"></div>';
        h += '<div class="fld"><label class="fld-label">Type</label><select class="fld-select" id="admFldType"><option' + (adminForm.type === 'lesson' ? ' selected' : '') + '>lesson</option><option' + (adminForm.type === 'coding' ? ' selected' : '') + '>coding</option></select></div>';
        h += '<div class="fld"><label class="fld-label">Status</label><select class="fld-select" id="admFldStatus"><option' + (adminForm.status === 'locked' ? ' selected' : '') + '>locked</option><option' + (adminForm.status === 'available' ? ' selected' : '') + '>available</option><option' + (adminForm.status === 'in_progress' ? ' selected' : '') + '>in_progress</option><option' + (adminForm.status === 'done' ? ' selected' : '') + '>done</option></select></div>';
        h += '<div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.3em">' + (infoFilled ? '✅ Info complete — click any step above' : 'Fill in the Title above, then navigate freely') + '</div>';
        break;
      case 2:
        h += '<div class="fld"><label class="fld-label">Notes</label><textarea class="fld-textarea" id="admFldNotes">' + escHtml(adminForm.notes) + '</textarea></div>';
        h += '<div class="fld"><label class="fld-label">Mnemonic</label><input class="fld-input" id="admFldMnemonic" value="' + escHtml(adminForm.mnemonic) + '"></div>';
        break;
      case 3:
        h += '<div class="fld"><label class="fld-label">Quiz Questions</label>';
        (adminForm.quiz.length > 0 ? adminForm.quiz : [{ question: '', options: ['', '', '', ''], correct_index: 0 }]).forEach((q, qi) => {
          h += '<div style="border:1px solid var(--border-dim);padding:0.4em;margin-bottom:0.4em">';
          h += '<input class="fld-input" data-adm-q="' + qi + '" data-adm-qf="question" value="' + escHtml(q.question) + '" placeholder="Question ' + (qi + 1) + '" style="margin-bottom:0.2em">';
          (q.options && q.options.length ? q.options : ['', '', '', '']).forEach((opt, oi) => {
            h += '<div style="display:flex;align-items:center;gap:0.3em;margin-top:0.15em">';
            h += '<input type="radio" name="q' + qi + '_correct" data-adm-q="' + qi + '" data-adm-qf="correct" value="' + oi + '"' + (oi === q.correct_index ? ' checked' : '') + '>';
            h += '<input class="fld-input" data-adm-q="' + qi + '" data-adm-qf="opt-' + oi + '" value="' + escHtml(opt) + '" placeholder="Option ' + (oi + 1) + '" style="flex:1;font-size:0.75rem">';
            h += '</div>';
          });
          h += '<button class="btn-icon" data-adm-q-del="' + qi + '" style="margin-top:0.2em;font-size:0.75rem">✕ Remove</button>';
          h += '</div>';
        });
        h += '<button class="btn btn-sm" id="admAddQuestion">+ Add Question</button></div>';
        break;
      case 4:
        h += '<div class="fld"><label class="fld-label">Exercise Prompt</label><textarea class="fld-textarea" id="admFldCodingPrompt">' + escHtml(adminForm.coding.prompt || '') + '</textarea></div>';
        h += '<div class="fld"><label class="fld-label">Starter Code</label><textarea class="fld-textarea" id="admFldCodingStarter">' + escHtml(adminForm.coding.starter || '') + '</textarea></div>';
        h += '<div class="fld"><label class="fld-label">Solution</label><textarea class="fld-textarea" id="admFldCodingSolution">' + escHtml(adminForm.coding.solution || '') + '</textarea></div>';
        break;
      case 5:
        h += '<div class="fld"><label class="fld-label">Flashcards</label>';
        (adminForm.flashcards.length > 0 ? adminForm.flashcards : [{ front: '', back: '' }]).forEach((fc, fi) => {
          h += '<div style="display:flex;gap:0.3em;margin-top:0.2em">';
          h += '<input class="fld-input" data-adm-fc="' + fi + '" data-adm-fcf="front" value="' + escHtml(fc.front) + '" placeholder="Front" style="flex:1;font-size:0.75rem">';
          h += '<input class="fld-input" data-adm-fc="' + fi + '" data-adm-fcf="back" value="' + escHtml(fc.back) + '" placeholder="Back" style="flex:1;font-size:0.75rem">';
          h += '<button class="btn-icon" data-adm-fc-del="' + fi + '" style="font-size:0.75rem">✕</button></div>';
        });
        h += '<button class="btn btn-sm" id="admAddFlashcard" style="margin-top:0.3em">+ Add Card</button></div>';
        break;
    }

    // Bottom bar: Save button always visible + nav arrows
    h += '<div class="btn-grp" style="margin-top:0.6em;justify-content:space-between">';
    h += '<div class="btn-grp">';
    h += '<button class="btn btn-green" id="admSaveBtn">💾 Save</button>';
    h += '<span style="font-size:0.7rem;color:var(--text-dim);margin-left:0.3em">saves current step data</span>';
    h += '</div><div class="btn-grp">';
    if (adminStep > 1) h += '<button class="btn btn-alt" data-adm-step="' + (adminStep - 1) + '">← Prev</button>';
    if (adminStep < 5) h += '<button class="btn" data-adm-step="' + (adminStep + 1) + '">Next →</button>';
    h += '</div></div>';
  } else if (sel && !isLeaf) {
    h += '<div class="empty-state"><div class="empty-icon">📁</div><div>Select a lesson to edit its content</div></div>';
  } else {
    h += '<div class="empty-state"><div class="empty-icon">📂</div><div>Select a course or lesson from the tree</div></div>';
  }

  h += '</div></div></div></div></div>';
  screen.innerHTML = h;

  // Bind admin tree click
  document.querySelectorAll('[data-adm-id]').forEach(el => {
    el.addEventListener('click', async () => {
      const id = el.dataset.admId;
      const node = flattenTree(adminData).find(n => n.id === id);
      if (node && node.type && node.type !== 'course') {
        await loadAdminLesson(id);
      }
      adminSelId = id;
      persist('adminSel', id);
      renderAdminFull(screen);
    });
  });

  // Bind step navigation
  // Clickable wizard steps (goto any step if info filled)
  document.querySelectorAll('[data-adm-goto]').forEach(el => {
    el.addEventListener('click', () => {
      const targetStep = parseInt(el.dataset.admGoto);
      collectForm();
      const infoOk = adminForm.title && adminForm.title.trim().length > 0;
      if (targetStep === 1 || infoOk) {
        adminStep = targetStep;
        persist('adminStep', targetStep);
        renderAdminFull(screen);
      }
    });
  });

  // Prev/Next buttons
  document.querySelectorAll('[data-adm-step]').forEach(el => {
    el.addEventListener('click', () => { collectForm(); adminStep = parseInt(el.dataset.admStep); persist('adminStep', adminStep); renderAdminFull(screen); });
  });

  // Bind form field changes
  document.addEventListener('change', collectForm);
  document.addEventListener('input', collectForm);

  function collectForm() {
    if (!adminForm) return;
    const t = document.getElementById('admFldTitle');
    if (t) adminForm.title = t.value;
    const tp = document.getElementById('admFldType');
    if (tp) adminForm.type = tp.value;
    const st = document.getElementById('admFldStatus');
    if (st) adminForm.status = st.value;
    const nt = document.getElementById('admFldNotes');
    if (nt) adminForm.notes = nt.value;
    const mn = document.getElementById('admFldMnemonic');
    if (mn) adminForm.mnemonic = mn.value;
    const cp = document.getElementById('admFldCodingPrompt');
    if (cp) adminForm.coding.prompt = cp.value;
    const cs = document.getElementById('admFldCodingStarter');
    if (cs) adminForm.coding.starter = cs.value;
    const csl = document.getElementById('admFldCodingSolution');
    if (csl) adminForm.coding.solution = csl.value;

    document.querySelectorAll('[data-adm-q]').forEach(el => {
      const qi = parseInt(el.dataset.admQ);
      const field = el.dataset.admQf;
      if (!adminForm.quiz[qi]) return;
      if (field === 'question') adminForm.quiz[qi].question = el.value;
      else if (field.startsWith('opt-')) {
        const oi = parseInt(field.split('-')[1]);
        if (!adminForm.quiz[qi].options) adminForm.quiz[qi].options = [];
        adminForm.quiz[qi].options[oi] = el.value;
      } else if (field === 'correct' && el.checked) {
        adminForm.quiz[qi].correct_index = parseInt(el.value);
      }
    });

    document.querySelectorAll('[data-adm-fc]').forEach(el => {
      const fi = parseInt(el.dataset.admFc);
      const field = el.dataset.admFcf;
      if (!adminForm.flashcards[fi]) return;
      adminForm.flashcards[fi][field] = el.value;
    });
  }

  // Add question
  document.getElementById('admAddQuestion')?.addEventListener('click', () => {
    collectForm();
    adminForm.quiz.push({ question: '', options: ['', '', '', ''], correct_index: 0 });
    renderAdminFull(screen);
  });

  // Remove question
  document.querySelectorAll('[data-adm-q-del]').forEach(el => {
    el.addEventListener('click', () => {
      collectForm();
      const idx = parseInt(el.dataset.admQDel);
      adminForm.quiz.splice(idx, 1);
      renderAdminFull(screen);
    });
  });

  // Add flashcard
  document.getElementById('admAddFlashcard')?.addEventListener('click', () => {
    collectForm();
    adminForm.flashcards.push({ front: '', back: '' });
    renderAdminFull(screen);
  });

  // Remove flashcard
  document.querySelectorAll('[data-adm-fc-del]').forEach(el => {
    el.addEventListener('click', () => {
      collectForm();
      const idx = parseInt(el.dataset.admFcDel);
      adminForm.flashcards.splice(idx, 1);
      renderAdminFull(screen);
    });
  });

  // Add lesson
  document.getElementById('admAddLesson')?.addEventListener('click', async () => {
    const courseId = adminSelId && sel && !isLeaf ? adminSelId : (sel ? (sel.course_id || 'react') : 'react');
    const name = prompt('Lesson name:');
    if (!name) return;
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    await fetch('/api/admin/lessons', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, title: name, type: 'lesson', status: 'locked', course_id: courseId }),
    });
    adminDirty = true;
    await loadAdminTree();
    adminSelId = id;
    persist('adminSel', id);
    await loadAdminLesson(id);
    renderAdminFull(screen);
  });

  // Add course
  document.getElementById('admAddCourse')?.addEventListener('click', async () => {
    const parentId = '';
    const name = prompt('Course name:');
    if (!name) return;
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    await fetch('/api/admin/courses', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name, parent_id: parentId }),
    });
    adminDirty = true;
    await loadAdminTree();
    renderAdminFull(screen);
  });

  // Delete node
  document.getElementById('admDeleteNode')?.addEventListener('click', async () => {
    if (!adminSelId || !confirm('Delete "' + (sel ? sel.name || sel.id : '') + '"?')) return;
    const node = flattenTree(adminData).find(n => n.id === adminSelId);
    if (node && node.type !== 'course') {
      await fetch('/api/admin/lessons/' + adminSelId, { method: 'DELETE' });
    } else {
      await fetch('/api/admin/courses/' + adminSelId, { method: 'DELETE' });
    }
    adminSelId = null;
    persist('adminSel', null);
    adminDirty = true;
    await loadAdminTree();
    renderAdminFull(screen);
  });

  // Save button — saves current step data
  document.getElementById('admSaveBtn')?.addEventListener('click', async () => {
    collectForm();
    const id = adminSelId;

    // Always save lesson fields (title, type, status)
    await fetch('/api/admin/lessons/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: adminForm.title, type: adminForm.type, status: adminForm.status,
        notes: adminForm.notes, mnemonic: adminForm.mnemonic, course_id: adminForm.course_id,
      }),
    });

    // Save step-specific data
    if (adminStep === 3) {
      await fetch('/api/admin/lessons/' + id, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quiz: adminForm.quiz }),
      });
    } else if (adminStep === 4) {
      await fetch('/api/admin/lessons/' + id, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ coding: adminForm.coding }),
      });
    } else if (adminStep === 5) {
      await fetch('/api/admin/lessons/' + id, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ flashcards: adminForm.flashcards }),
      });
    }

    adminDirty = true;
    learnDirty = true;
    document.getElementById('statusBar').innerHTML = '<span class="prefix">›</span> ✅ Step ' + adminStep + ' saved! Switch to Learn to see changes.';
  });

  // Sync buttons
  const syncArea = document.createElement('div');
  syncArea.style.cssText = 'display:flex;gap:0.5em;padding:0.5em 1em;flex-shrink:0;border-top:1px solid var(--border)';
  syncArea.innerHTML = `
    <button class="btn" id="syncExportBtn">📤 Export Sync</button>
    <div style="display:flex;gap:0.3em;align-items:center">
      <input class="fld-input" id="syncCodeInput" placeholder="Sync Code" style="width:10em;font-size:0.75rem">
      <button class="btn btn-alt" id="syncImportBtn">📥 Import</button>
    </div>
    <span id="syncStatus" style="font-size:0.75rem;color:var(--text-dim);align-self:center"></span>`;
  document.querySelector('.admin-box')?.closest('.admin-editor-panel')?.after(syncArea);

  document.getElementById('syncExportBtn')?.addEventListener('click', async () => {
    const res = await api('/api/sync/export');
    document.getElementById('syncCodeInput').value = res.code;
    document.getElementById('syncStatus').textContent = '✅ Exported (' + res.data_size + ' bytes)';
  });
  document.getElementById('syncImportBtn')?.addEventListener('click', async () => {
    const code = document.getElementById('syncCodeInput').value.trim();
    if (!code) return;
    const res = await fetch('/api/sync/import', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    if (res.ok) {
      const data = await res.json();
      document.getElementById('syncStatus').textContent = '✅ Imported';
      adminDirty = true;
    } else {
      document.getElementById('syncStatus').textContent = '❌ Invalid or expired code';
    }
  });

  // JSON Import section
  const jsonArea = document.createElement('div');
  jsonArea.style.cssText = 'border-top:1px solid var(--border-dim);flex-shrink:0';
  jsonArea.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0.4em 1em;cursor:pointer;background:var(--bg2)" id="jsonImportToggle">
      <span style="font-size:0.7rem;color:var(--green);letter-spacing:0.05em;text-transform:uppercase">📥 JSON Import — paste course/topic data</span>
      <span style="font-size:0.65rem;color:var(--text-dim)" id="jsonImportArrow">▼</span>
    </div>
    <div id="jsonImportBody" style="padding:0.5em 1em">
      <div style="display:flex;gap:0.5em;margin-bottom:0.4em">
        <select id="jsonImportMode" class="fld-select" style="font-size:0.75rem;width:auto">
          <option value="courses">Import Courses (replaces all)</option>
          <option value="lesson">Import Single Lesson</option>
        </select>
        <input class="fld-input" id="jsonImportCourseId" placeholder="Course ID (for lesson import)" style="width:12em;font-size:0.75rem;display:none">
      </div>
