<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BruteForce Learning — TUI Component Prototype</title>
<style>
:root {
  --bg: #0d0d0f; --surface: #111318; --surface-alt: #161820;
  --border: #2a2d3a; --border-dim: #1e2130;
  --text: #c8ccd8; --text-muted: #5a5f72; --text-dim: #3f4252;
  --purple: #9d7dea; --cyan: #4ec9b0; --yellow: #e5c07b;
  --red: #e06c75; --green: #98c379; --blue: #61afef;
  --font-mono: "JetBrains Mono","Fira Code","Cascadia Code","Hack","Courier New",monospace;
  --font-display: "Share Tech Mono","Courier New",monospace;
}
/* Hide scrollbars globally */
*::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }
html { font-size: clamp(12px, 1.6vh, 28px); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 1rem; line-height: 1.5;
  height: 100vh; margin: 0; padding: 0; overflow: hidden;
  display: flex; flex-direction: column;
}
#app {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
  width: 100%; margin: 0 auto;
}
#app.layout-wide { max-width: none; }
#app.layout-narrow { max-width: min(86rem, 1100px); }
.title-bar {
  background: #1a1d26; border-bottom: 1px solid var(--border);
  padding: 0.55em 1em; display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; color: var(--text-muted); user-select: none; flex-shrink: 0;
  position: relative;
}
.title-bar .tb-center { margin: 0 auto; }
.title-bar .tb-toggle {
  position: absolute; right: 1em; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: var(--text-dim); font-size: 0.85rem;
  background: none; border: 1px solid var(--border-dim); padding: 0.15em 0.5em;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.05em;
}
.title-bar .tb-toggle:hover { color: var(--text); border-color: var(--border); }
.header-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5em 1.2em; border: 1px solid var(--purple);
  margin: 0.7em 1em 0; flex-shrink: 0;
}
.h-l { color: var(--text-muted); font-size: 0.95rem; }
.h-y { color: var(--yellow); font-weight: bold; }
.h-g { color: var(--green); }
.h-p { color: var(--purple); font-weight: bold; }
.h-s { color: var(--text-dim); }
.h-stat { display: flex; align-items: baseline; gap: 0.3em; font-size: 0.95rem; }
.main-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 0.5em 1em; gap: 0.8em; overflow-y: auto; min-height: 0;
}
.screen-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.screen-tab {
  padding: 0.35em 1em; font-size: 0.95rem; color: var(--text-muted);
  cursor: pointer; user-select: none; text-transform: uppercase;
  letter-spacing: 0.06em; border-bottom: 2px solid transparent;
}
.screen-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: bold; }
.screen-tab:hover { color: var(--text); background: #1a1d2e; }
.screen-content {
  flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 1em;
}
.panel {
  border: 1px solid var(--border); position: relative;
  padding: 3.5em 1em 1em; margin-bottom: 0;
}
.panel-title {
  position: absolute; top: -0.9em; left: 0.8em; background: var(--bg);
  padding: 0 0.6em; color: var(--purple); font-weight: bold;
  font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase;
  line-height: 1.3;
}
.p-title-sub {
  color: var(--text-muted); font-weight: normal; font-style: italic;
  text-transform: none; letter-spacing: 0;
}
.panel-body { padding: 0; }

/* ===== Shared Components ===== */
.badge {
  display: inline-flex; align-items: center; gap: 0.3em;
  font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em;
}
.badge::before { content: "◆"; color: var(--purple); }

.stat-4up { display: flex; gap: 0.8em; flex-shrink: 0; }
.stat-card {
  flex: 1; border: 1px solid var(--border); text-align: center;
  padding: 1.5em 0.8em;
}
.stat-card-num {
  font-family: var(--font-display); font-size: 1.8rem; line-height: 1;
}
.stat-card-label {
  font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-top: 0.6em;
}

/* Progress bar text-mode */
.pb-row { display: flex; align-items: center; gap: 0.5em; font-size: 0.95rem; padding: 0.15em 0; }
.pb-label { color: var(--text); width: 20ch; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pb-track { flex: 1; height: 1.1em; position: relative; line-height: 1.1em; letter-spacing: 0.15em; color: var(--border); font-size: 0.95rem; overflow: hidden; }
.pb-fill-text { position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; letter-spacing: 0.15em; }
.pb-pct { text-align: right; font-size: 0.85rem; min-width: 4ch; }
.pb-pct.c0 { color: var(--red); } .pb-pct.c1 { color: var(--yellow); } .pb-pct.c2 { color: var(--green); }

/* Tables */
.tui-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
.tui-table th {
  text-align: left; padding: 0.2em 0.4em; color: var(--text-muted);
  font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border-dim); font-weight: normal;
}
.tui-table td { padding: 0.2em 0.4em; vertical-align: middle; }
.tui-table tr { cursor: pointer; }
.tui-table tr:hover { background: #1a1d2e; }
.tui-table tr.selected { background: #2a1f5a; }
.tui-table tr.selected td { color: var(--purple); }
.tr-prefix { width: 1.2em; text-align: center; font-size: 0.85rem; }

.dot-unsolved { color: var(--text-dim); } .dot-solved { color: var(--green); } .dot-selected { color: var(--purple); }

/* Details label/value */
.dl-row { display: flex; gap: 0.4em; padding: 0.05em 0; font-size: 0.95rem; }
.dl-label { color: var(--text-muted); width: 7ch; flex-shrink: 0; }
.dl-value { color: var(--text); }
.dl-value.accent-rating { color: var(--yellow); }
.dl-value.accent-tags { color: var(--purple); }
.dl-value.accent-url { color: var(--text-dim); font-size: 0.85rem; }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 0.5em; font-size: 0.95rem; padding: 0.15em 0; }
.filter-label { color: var(--text-muted); }
.filter-token { color: var(--text); font-weight: bold; }
.filter-count { color: var(--text-muted); font-size: 0.85rem; margin-left: auto; }

/* Keybind bar */
.keybind-bar {
  border-top: 1px solid var(--border); padding: 0.45em 1em;
  font-size: 0.85rem; display: flex; gap: 0.7em; flex-wrap: wrap; flex-shrink: 0;
}
.kb-key { color: var(--text); font-weight: bold; }
.kb-action { color: var(--text-muted); }
.kb-pos { color: var(--text-muted); margin-right: auto; }

/* Status bar (bottom) */
.status-bar {
  border-top: 1px solid var(--border); padding: 0.3em 1em;
  font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.3em;
  flex-shrink: 0;
}
.status-bar .prefix { color: var(--text-muted); }

.status-dot { font-size: 0.8rem; }
.solved-dot { color: var(--green); } .unsolved-dot { color: var(--text-dim); } .selected-dot { color: var(--purple); }

/* Spinner */
.spinner { display: inline-block; animation: spin 0.8s steps(10) infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.p-sub-inline {
  color: var(--text-muted); font-style: italic; font-weight: normal;
  text-transform: none; letter-spacing: 0; font-size: 0.85rem;
}

/* ===== Problems Screen ===== */
.problems-table { flex: 1; min-height: 0; overflow-y: auto; }
.problems-table .tui-table th:nth-child(2) { width: 8ch; }
.problems-table .tui-table th:nth-child(4) { width: 7ch; text-align: right; }
.problems-table .tui-table th:nth-child(5) { width: 10ch; text-align: right; }
.problems-table .tui-table td:nth-child(2) { color: var(--text-dim); }
.problems-table .tui-table td:nth-child(4) { color: var(--yellow); text-align: right; }
.problems-table .tui-table td:nth-child(5) { text-align: right; color: var(--text-muted); }
.problems-table .tui-table tr.selected td:nth-child(3) { color: var(--purple); font-weight: bold; }
.problems-table .tui-table tr.selected td:nth-child(4) { color: var(--yellow); }

.details-grid { display: flex; flex-wrap: wrap; gap: 0.15em 0; }
.details-row { width: 100%; display: flex; gap: 0.3em; font-size: 0.95rem; padding: 0.05em 0; }
.details-row .lbl { color: var(--text-muted); width: 7ch; flex-shrink: 0; }
.details-row .val { color: var(--text); }
.details-row .val.rating { color: var(--yellow); }
.details-row .val.tags { color: var(--purple); }
.details-row .val.url { color: var(--text-dim); font-size: 0.85rem; }
.details-problem-name { display: flex; align-items: center; gap: 0.4em; margin-bottom: 0.3em; }
.details-problem-name .id { color: var(--text-dim); }
.details-problem-name .name { color: var(--text); font-weight: bold; }

/* ===== Contests Screen ===== */
.contests-table .tui-table th:nth-child(2) { width: 12ch; }
.contests-table .tui-table th:nth-child(4) { width: 7ch; text-align: right; }
.contests-table .tui-table th:nth-child(5) { width: 18ch; text-align: right; }
.contests-table td:nth-child(4) { text-align: right; }
.contests-table td:nth-child(5) { text-align: right; }
.when-upcoming { color: var(--cyan); } .when-past { color: var(--text-muted); }
.when-next { color: var(--cyan); font-weight: bold; }
.contest-name-upcoming { color: var(--text); } .contest-name-past { color: var(--text-muted); }
.contest-length { color: var(--text-dim); }
.contest-starts-upcoming { color: var(--yellow); } .contest-starts-past { color: var(--text-dim); }

/* ===== Analytics Screen ===== */
.pixel-chart { display: flex; align-items: flex-end; gap: 0.2em; height: 6em; padding: 0.3em 0; }
.pixel-bar { width: 1.3em; min-height: 0.3em; border: 1px solid var(--border-dim); }
.pixel-bar.low { background: #4a4d5a; } .pixel-bar.mid { background: var(--green); }
.pixel-bar.high { background: var(--cyan); } .pixel-bar.peak { background: var(--blue); }
.chart-axis { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid var(--border-dim); padding-top: 0.15em; margin-top: 0.15em; }
.analytics-header { display: flex; gap: 1em; font-size: 0.95rem; align-items: baseline; padding: 0.15em 0; }
.analytics-header .cur { color: var(--purple); font-weight: bold; }
.analytics-header .lbl { color: var(--text-muted); }
.analytics-header .rng { color: var(--text); }

.topic-table .tui-table th:nth-child(2) { width: 20ch; }
.topic-table .tui-table th:nth-child(3) { width: 8ch; text-align: right; }
.topic-table .tui-table th:nth-child(4) { width: 6ch; text-align: right; }
.topic-table .tui-table th:nth-child(5) { width: 12ch; text-align: center; }
.topic-table .tui-table th:nth-child(6) { width: 6ch; text-align: center; }
.topic-table td:nth-child(3) { text-align: right; color: var(--text-muted); }
.topic-table td:nth-child(4) { text-align: right; }
.topic-table td:nth-child(5) { text-align: center; }
.topic-table td:nth-child(6) { text-align: center; }
.topic-table .rate-0 { color: var(--red); } .topic-table .rate-mid { color: var(--yellow); } .topic-table .rate-high { color: var(--green); }

.heatmap { padding: 0.3em 0; }
.heatmap-row { display: flex; align-items: center; gap: 0.3em; margin-bottom: 0.15em; }
.heatmap-day { color: var(--text-dim); width: 0.9em; font-size: 0.8rem; text-align: right; flex-shrink: 0; }
.heatmap-cells { display: flex; gap: 0.15em; flex-wrap: wrap; }
.heatmap-cell { width: 0.7em; height: 0.7em; border: 1px solid transparent; }
.heatmap-cell.l0 { background: transparent; border-color: transparent; }
.heatmap-cell.l1 { background: #3d2f6e; } .heatmap-cell.l2 { background: #5a3ea0; }
.heatmap-cell.l3 { background: #7b55d4; } .heatmap-cell.l4 { background: var(--purple); }
.heatmap-legend { display: flex; align-items: center; gap: 0.3em; justify-content: flex-end; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3em; }
.heatmap-legend .leg-cell { width: 0.7em; height: 0.7em; }
.heatmap-legend .leg-cell.l1 { background: #3d2f6e; }
.heatmap-legend .leg-cell.l2 { background: #5a3ea0; }
.heatmap-legend .leg-cell.l3 { background: #7b55d4; }
.heatmap-legend .leg-cell.l4 { background: var(--purple); }

/* ===== Recommend Screen ===== */
.targeting-banner { padding: 0.4em 0.5em; display: flex; flex-wrap: wrap; gap: 0.5em 1em; font-size: 0.95rem; }
.target-topic { color: var(--purple); font-weight: bold; }
.target-pct { color: var(--text-muted); }
.target-pct.critical { color: var(--red); } .target-pct.warning { color: var(--yellow); } .target-pct.ok { color: var(--green); }

.rec-table .tui-table th:nth-child(2) { width: 8ch; }
.rec-table .tui-table th:nth-child(4) { width: 7ch; text-align: right; }
.rec-table td:nth-child(2) { color: var(--text-dim); }
.rec-table td:nth-child(4) { color: var(--yellow); text-align: right; }
.rec-table td:nth-child(5) { color: var(--text-muted); }
.rec-table tr.selected td:nth-child(2) { color: var(--purple); font-weight: bold; }
.rec-table tr.selected td:nth-child(3) { color: var(--purple); font-weight: bold; }
.rec-table tr.selected td:nth-child(5) { color: var(--cyan); }

/* Animated LED */
.led-display {
  font-family: var(--font-display); font-size: 3rem; line-height: 1;
  letter-spacing: 0.02em; display: inline-block;
}
.led-pulse { animation: ledPulse 2s ease-in-out infinite; }
@keyframes ledPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

.loading-text { font-size: 0.95rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4em; }

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.cursor-blink { animation: blink 1s step-end infinite; color: var(--text); }
.sep-dash { color: var(--text-dim); font-size: 0.85rem; }

.pb-track-block {
  flex: 1; font-size: 1rem; line-height: 1.2; letter-spacing: 0.15em; color: var(--border); position: relative;
}
.pb-fill-block {
  position: absolute; top: 0; left: 0; overflow: hidden; white-space: nowrap; letter-spacing: 0.15em;
}
</style>
</head>
<body>
<div id="app">
  <div class="title-bar">
    <span class="tb-center">BruteForce Learning — TUI Component Prototype</span>
    <button class="tb-toggle" id="widthToggle">[––]</button>
  </div>

  <div class="header-bar">
    <div class="h-stat"><span class="h-l">rating</span> <span class="h-y">1847</span></div>
    <div class="h-stat"><span class="h-l">solved</span> <span class="h-g">31</span><span class="h-s">/</span><span class="h-l">48</span></div>
    <div class="h-stat"><span class="h-l">streak</span> <span class="h-y">10d</span></div>
    <div class="h-stat"><span class="h-l">xp</span> <span class="h-p">450</span><span class="h-s">/</span><span class="h-l">600</span></div>
  </div>

  <div class="main-area" id="mainArea">
    <div class="screen-tabs" id="screenTabs">
      <div class="screen-tab active" data-screen="dashboard">Dashboard</div>
      <div class="screen-tab" data-screen="problems">Problems</div>
      <div class="screen-tab" data-screen="contests">Contests</div>
      <div class="screen-tab" data-screen="analytics">Analytics</div>
      <div class="screen-tab" data-screen="recommend">Recommend</div>
    </div>
    <div class="screen-content" id="screenContent"></div>
  </div>

  <div class="keybind-bar" id="keybindBar">
    <span class="kb-pos">1/1</span>
    <span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> move</span>
    <span class="kb-key">o</span><span class="kb-action"> open</span>
    <span class="kb-key">/</span><span class="kb-action"> search</span>
    <span class="kb-key">r</span><span class="kb-action"> sync</span>
  </div>
  <div class="status-bar">
    <span class="prefix">›</span> Press <span style="color:var(--text);font-weight:bold">1</span><span style="color:var(--text-muted)">–</span><span style="color:var(--text);font-weight:bold">5</span> to switch screens
    <span style="margin-left:auto;color:var(--text-muted)">PROTOTYPE — throwaway</span>
  </div>
</div>

<script>
const SCREENS = ['dashboard','problems','contests','analytics','recommend'];
let currentScreen = 'dashboard';
function getParam(k) { return new URLSearchParams(window.location.search).get(k); }
function setParam(k,v) { const u=new URL(window.location); u.searchParams.set(k,v); window.history.replaceState({},'',u); }
function render() {
  const c = document.getElementById('screenContent');
  c.innerHTML = renderScreen(currentScreen);
  document.querySelectorAll('.screen-tab').forEach(t => t.classList.toggle('active', t.dataset.screen === currentScreen));
  updateKeybinds();
}
function updateKeybinds() {
  const kb = document.getElementById('keybindBar');
  const binds = {
    dashboard: '<span class="kb-pos">1/5</span><span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> navigate</span> <span class="kb-key">r</span><span class="kb-action"> sync</span>',
    problems: '<span class="kb-pos">2/5</span><span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> move</span> <span class="kb-key">o</span><span class="kb-action"> open</span> <span class="kb-key">U</span><span class="kb-action"> url</span> <span class="kb-key">/</span><span class="kb-action"> search</span> <span class="kb-key">f</span><span class="kb-action"> rating</span> <span class="kb-key">p</span><span class="kb-action"> platform</span> <span class="kb-key">r</span><span class="kb-action"> sync</span>',
    contests: '<span class="kb-pos">3/5</span><span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> move</span> <span class="kb-key">o</span><span class="kb-action"> solve problems</span> <span class="kb-key">b</span><span class="kb-action"> browser</span>',
    analytics: '<span class="kb-pos">4/5</span><span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> scroll</span> <span class="kb-key">t</span><span class="kb-action"> toggle topic</span> <span class="kb-key">w</span><span class="kb-action"> weeks</span>',
    recommend: '<span class="kb-pos">5/5</span><span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> move</span> <span class="kb-key">o</span><span class="kb-action"> open</span> <span class="kb-key">r</span><span class="kb-action"> refresh</span>',
  };
  kb.innerHTML = binds[currentScreen] || '';
}
function setScreen(s) { currentScreen = s; setParam('s', s); render(); }
function renderScreen(s) {
  switch(s) {
    case 'dashboard': return renderDashboard();
    case 'problems': return renderProblems();
    case 'contests': return renderContests();
    case 'analytics': return renderAnalytics();
    case 'recommend': return renderRecommend();
  }
}

function renderDashboard() {
  return `
    <div class="stat-4up">
      <div class="stat-card"><div class="stat-card-num" style="color:var(--yellow)">48</div><div class="stat-card-label">Problems</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--purple)">10d</div><div class="stat-card-label">Streak</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--cyan)">73%</div><div class="stat-card-label">Mastery</div></div>
      <div class="stat-card"><div class="stat-card-num" style="color:var(--green)">31</div><div class="stat-card-label">Solved</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">Progress <span class="p-title-sub">— text-mode bars</span></div>
      <div class="panel-body" style="padding:0.15em 0">
        <div class="pb-row">
          <span class="pb-label">data structures</span>
          <div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:0%;color:var(--red)"></span></div>
          <span class="pb-pct c0">0%</span>
        </div>
        <div class="pb-row">
          <span class="pb-label">graphs</span>
          <div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:40%;color:var(--cyan)">████████████</span></div>
          <span class="pb-pct c1">40%</span>
        </div>
        <div class="pb-row">
          <span class="pb-label">dynamic programming</span>
          <div class="pb-track">████████████████████████████████<span class="pb-fill-text" style="width:65%;color:var(--yellow)">████████████████████</span></div>
          <span class="pb-pct c1">65%</span>

function renderAnalytics() {
  const bars = [1043,1150,1220,1180,1300,1420,1380,1450,1560,1620,1700,1847];
  const max = Math.max(...bars);
  const min = Math.min(...bars);
  const barCls = (v) => {
    if (v === max) return 'peak';
    const pct = (v - min) / (max - min);
    if (pct < 0.33) return 'low';
    if (pct < 0.66) return 'mid';
    return 'high';
  };
  const days = ['M','W','F'];
  const heatmapData = days.map(() =>
    Array.from({length:52}, () => {
      const r = Math.random();
      return r < 0.3 ? 0 : r < 0.55 ? 1 : r < 0.75 ? 2 : r < 0.9 ? 3 : 4;
    })
  );
  return `
    <div class="panel">
      <div class="panel-title">Rating History</div>
      <div class="panel-body" style="padding:0.3em 0.4em">
        <div class="analytics-header">
          <span><span class="cur">1847</span> <span class="lbl">peak</span> <span class="cur">1847</span></span>
          <span><span class="lbl">range</span> <span class="rng">1043–1847</span></span>
        </div>
        <div class="pixel-chart">
          ${bars.map(v => `<div class="pixel-bar ${barCls(v)}" style="height:${Math.max(0.3, (v-min)/(max-min)*5)}em"></div>`).join('')}
        </div>
        <div class="chart-axis">
          <span>1043</span>
          <span>rating over time</span>
          <span>1847</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Topic Breakdown <span class="p-title-sub">— weakest first</span></div>
      <div class="panel-body topic-table">
        <table class="tui-table">
          <thead><tr><th></th><th>Topic</th><th>Solved</th><th>Rate</th><th>Progress</th><th>Avg</th></tr></thead>
          <tbody>
            ${[
              {t:'matrices', s:'0/1', r:0, p:'—', a:'—'},
              {t:'divide and conqu…', s:'0/1', r:0, p:'—', a:'—'},
              {t:'data structures', s:'2/8', r:25, p:'░░█░░', a:'—'},
              {t:'graphs', s:'5/12', r:42, p:'███░░', a:'1700'},
              {t:'sortings', s:'4/6', r:66, p:'█████', a:'—'},
              {t:'dynamic progr…', s:'6/8', r:75, p:'█████', a:'1650'},
            ].map(t => {
              const rCls = t.r === 0 ? 'rate-0' : t.r < 50 ? 'rate-mid' : 'rate-high';
              return `<tr><td class="tr-prefix"></td><td>${t.t}</td><td>${t.s}</td><td class="${rCls}">${t.r}%</td><td style="font-size:0.85rem;letter-spacing:0.1em;color:var(--yellow)">${t.p}</td><td style="color:var(--text-dim)">${t.a}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Activity <span class="p-title-sub">— last 52 weeks</span></div>
      <div class="panel-body heatmap" style="padding:0.4em">
        ${heatmapData.map((row, ri) => `
          <div class="heatmap-row">
            <span class="heatmap-day">${days[ri]}</span>
            <div class="heatmap-cells">${row.map(l => `<span class="heatmap-cell l${l}"></span>`).join('')}</div>
          </div>
        `).join('')}
        <div class="heatmap-legend">
          <span style="margin-right:auto;font-size:0.8rem;color:var(--text-dim)">less</span>
          <span class="leg-cell l1"></span>
          <span class="leg-cell l2"></span>
          <span class="leg-cell l3"></span>
          <span class="leg-cell l4"></span>
          <span style="margin-left:0.3em">more solves</span>
        </div>
      </div>
    </div>
  `;
}

function init() {
  currentScreen = getParam('s') || 'dashboard';

  // Width toggle
  const app = document.getElementById('app');
  const toggle = document.getElementById('widthToggle');
  let wide = localStorage.getItem('tui-wide') === 'true';
  function applyWidth(w) {
    wide = w;
    app.classList.toggle('layout-wide', wide);
    app.classList.toggle('layout-narrow', !wide);
    toggle.textContent = wide ? '[==]' : '[––]';
    localStorage.setItem('tui-wide', wide);
  }
  applyWidth(wide);
  toggle.addEventListener('click', () => applyWidth(!wide));

  document.querySelectorAll('.screen-tab').forEach(t => {
    t.addEventListener('click', () => setScreen(t.dataset.screen));
  });
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    const n = parseInt(e.key);
    if (n >= 1 && n <= 5) setScreen(SCREENS[n-1]);
  });
  render();
}
document.addEventListener('DOMContentLoaded', init);
