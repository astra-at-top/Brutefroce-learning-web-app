<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BruteForce Learning — Combined Prototype (E × Approach 2)</title>
<style>
:root {
  --bg: #0d0d0f; --surface: #111318; --surface-alt: #161820;
  --border: #2a2d3a; --border-dim: #1e2130;
  --text: #c8ccd8; --text-muted: #5a5f72; --text-dim: #3f4252;
  --purple: #9d7dea; --cyan: #4ec9b0; --yellow: #e5c07b;
  --red: #e06c75; --green: #98c379; --blue: #61afef;
  --font-mono: "JetBrains Mono","Fira Code","Cascadia Code","Hack","Courier New",monospace;
}
*::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }
html { font-size: clamp(12px, 1.6vh, 28px); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-mono); font-size: 1rem; line-height: 1.5;
  height: 100vh; margin: 0; padding: 0; overflow: hidden;
  display: flex; flex-direction: column;
}
#app {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
  width: 100%; margin: 0 auto;
}
#app.layout-wide { max-width: none; }
#app.layout-narrow { max-width: min(86rem, 1100px); }

.title-bar {
  background: #1a1d26; border-bottom: 1px solid var(--border);
  padding: 0.55em 1em; display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; color: var(--text-muted); user-select: none; flex-shrink: 0;
  position: relative;
}
.title-bar .tb-center { margin: 0 auto; }
.title-bar .tb-toggle {
  position: absolute; right: 1em; top: 50%; transform: translateY(-50%);
  cursor: pointer; font-size: 0.8rem; letter-spacing: 0.08em;
  background: var(--purple); color: #fff; border: none; padding: 0.35em 0.7em;
  font-family: var(--font-mono); text-transform: uppercase; font-weight: bold;
  line-height: 1;
}

.header-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5em 1.2em; border: 1px solid var(--purple);
  margin: 0.7em 1em 0; flex-shrink: 0;
}
.h-l { color: var(--text-muted); font-size: 0.95rem; }
.h-y { color: var(--yellow); font-weight: bold; }
.h-g { color: var(--green); }
.h-p { color: var(--purple); font-weight: bold; }
.h-s { color: var(--text-dim); }
.h-stat { display: flex; align-items: baseline; gap: 0.3em; font-size: 0.95rem; }

.main-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 0.5em 1em; gap: 0.8em; overflow-y: auto; min-height: 0;
}
.screen-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.screen-tab {
  padding: 0.35em 1em; font-size: 0.95rem; color: var(--text-muted);
  cursor: pointer; user-select: none; text-transform: uppercase;
  letter-spacing: 0.06em; border-bottom: 2px solid transparent;
}
.screen-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: bold; }
.screen-tab:hover { color: var(--text); background: #1a1d2e; }
.screen-content {
  flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 1em;
}

.panel {
  border: 1px solid var(--border); position: relative;
  padding: 0.8em; margin-bottom: 0;
}
.panel-title {
  position: absolute; top: -0.9em; left: 0.8em; background: var(--bg);
  padding: 0 0.6em; color: var(--purple); font-weight: bold;
  font-size: 0.9rem; letter-spacing: 0.08em; text-transform: uppercase;
  line-height: 1.3;
}
.panel-body { padding: 0; }

.keybind-bar {
  border-top: 1px solid var(--border); padding: 0.45em 1em;
  font-size: 0.85rem; display: flex; gap: 0.7em; flex-wrap: wrap; flex-shrink: 0;
}
.kb-key { color: var(--text); font-weight: bold; }
.kb-action { color: var(--text-muted); }
.kb-pos { color: var(--text-muted); margin-right: auto; }

.status-bar {
  border-top: 1px solid var(--border); padding: 0.3em 1em;
  font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.3em;
  flex-shrink: 0;
}
.status-bar .prefix { color: var(--text-muted); }

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.si-locked { color: var(--text-dim); }
.si-available { color: var(--text-muted); }
.si-progress { color: var(--yellow); }
.si-done { color: var(--green); }

.lesson-status { font-size: 0.85rem; }
.ls-locked { color: var(--text-dim); }
.ls-available { color: var(--text-muted); }
.ls-progress { color: var(--yellow); }
.ls-done { color: var(--green); }

.progress-micro {
  display: inline-flex; align-items: center; gap: 0.3em;
  font-size: 0.8rem; letter-spacing: 0.1em;
}
.progress-micro .pm-bar {
  width: 4em; height: 0.5em; background: var(--surface-alt);
  border: 1px solid var(--border-dim); display: inline-block;
}
.progress-micro .pm-fill { height: 100%; display: block; }

/* ===== Tree (variant E style) ===== */
.tree-panel { flex: 0 0 28%; min-width: 16em; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; }
.content-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.tree-split { display: flex; gap: 0.8em; flex: 1; min-height: 0; }
.tree-panel-fixed { flex: 0 0 28%; min-width: 16em; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; }

.tree-list { list-style: none; padding: 0.2em 0; }
.tree-item { user-select: none; }
.tree-item-content {
  display: flex; align-items: center; gap: 0.4em;
  padding: 0.2em 0.3em; cursor: pointer; font-size: 0.9rem;
  border-left: 2px solid transparent;
}
.tree-item-content:hover { background: #1a1d2e; }
.tree-item-content.selected { background: #2a1f5a; border-left-color: var(--purple); }
.tree-item-content.sel-course { border-left-color: var(--yellow); }
.tree-item-content.sel-course .ti-name { color: var(--yellow); font-weight: bold; }
.tree-item-content .ti-icon { width: 1.2em; text-align: center; flex-shrink: 0; }
.tree-item-content .ti-name { color: var(--text); }
.tree-item-content .ti-expand { color: var(--text-dim); width: 1em; cursor: pointer; flex-shrink: 0; }
.tree-children { padding-left: 1.2em; }
.tree-leaf .ti-icon { font-size: 0.85rem; }

/* ===== Roadmap (variant E style) ===== */
.roadmap-outer { display: flex; flex-direction: column; gap: 0.5em; flex: 1; }
.rm-header { text-align: center; padding: 0.3em 0; }
.rm-header .rm-course { color: var(--purple); font-weight: bold; font-size: 1.1rem; }
.rm-header .rm-progress { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.2em; }
.rm-progress-bar {
  width: 100%; height: 0.7em; background: var(--surface-alt);
  border: 1px solid var(--border-dim); margin: 0.3em 0;
}
.rm-progress-bar .rm-pb-fill { height: 100%; background: var(--purple); transition: width 0.3s; }
.rm-current {
  border: 1px solid var(--purple); padding: 0.8em;
  position: relative; margin: 0.3em 0;
}
.rm-current .rm-curr-label {
  position: absolute; top: -0.8em; left: 0.8em; background: var(--bg);
  padding: 0 0.4em; color: var(--yellow); font-weight: bold;
  font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase;
}
.rm-curr-name { color: var(--text); font-weight: bold; font-size: 1rem; }
.rm-curr-desc { color: var(--text-muted); font-size: 0.85rem; margin: 0.2em 0 0.4em; }
.rm-curr-actions { display: flex; gap: 0.5em; }
.rm-btn {
  background: var(--purple); color: #fff; border: none;
  font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer; font-weight: bold;
}
.rm-btn-outline {
  background: transparent; color: var(--purple); border: 1px solid var(--purple);
}
.rm-btn:hover { opacity: 0.85; }
.rm-upcoming { display: flex; flex-direction: column; gap: 0.2em; }
.rm-upcoming-item {
  display: flex; align-items: center; gap: 0.5em; padding: 0.25em 0.4em;
  font-size: 0.85rem; cursor: pointer;
}
.rm-upcoming-item:hover { background: #1a1d2e; }
.rm-upcoming-item .ui-name { color: var(--text); }
.rm-upcoming-item .ui-type {
  font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.05em; margin-left: auto;
}

/* ===== Streak Calendar (variant E style) ===== */
.streak-calendar { display: flex; flex-direction: column; gap: 0.2em; padding: 0.2em 0; }
.sc-header { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; padding: 0 0.2em; }
.sc-header .sc-month { color: var(--text); font-weight: bold; font-size: 0.95rem; }
.sc-header .sc-year { color: var(--text-muted); }
.sc-header .sc-streak { color: var(--yellow); font-weight: bold; }
.sc-table { width: 100%; border-collapse: collapse; border-spacing: 3px; border-collapse: separate; }
.sc-table th {
  font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.05em; padding: 0.1em 0; text-align: center;
  font-weight: normal; border: none;
}
.sc-table td {
  text-align: center; padding: 0.35em 0; font-size: 0.9rem;
  width: 14.28%; border-radius: 2px;
  border: 1px solid var(--border-dim);
}
.sc-table td.sc-day-num { color: var(--text-muted); }
.sc-table td.sc-filled { background: var(--purple); border-color: var(--purple); color: #fff; font-weight: bold; }
.sc-table td.sc-today { border-color: var(--yellow); box-shadow: inset 0 0 0 1px var(--yellow); color: var(--yellow); font-weight: bold; }
.sc-table td.sc-future { color: var(--text-dim); border-color: transparent; }
.sc-table td.sc-weekend.sc-day-num { opacity: 0.5; }
.sc-legend { display: flex; align-items: center; gap: 0.3em; font-size: 0.65rem; color: var(--text-dim); justify-content: center; margin-top: 0.15em; }
.sc-legend .sc-l-box { width: 0.6em; height: 0.6em; border: 1px solid var(--border-dim); }
.sc-legend .sc-l-box.light { background: var(--purple); opacity: 0.4; border-color: var(--purple); }
.sc-legend .sc-l-box.full { background: var(--purple); border-color: var(--purple); }

/* ===== Helping Hand ===== */
.help-content { display: flex; flex-direction: column; gap: 0.35em; padding: 0.3em 0; }
.help-badges { display: flex; gap: 0.2em; flex-wrap: wrap; }
.help-badge {
  font-size: 0.75rem; padding: 0.1em 0.45em; border: 1px solid var(--border);
  color: var(--text); display: inline-flex; align-items: center; gap: 0.3em;
  line-height: 1.4;
}
.help-badge .hb-num { font-weight: bold; }
.help-row { display: flex; align-items: center; gap: 0.5em; font-size: 0.85rem; }
.help-row .hr-label { color: var(--text-muted); min-width: 14ch; }

/* ===== Roadmap + Extra Panels (E style, for course view) ===== */
.rmx-panels { display: flex; gap: 0.8em; }
.rmx-panels .rmx-panel { flex: 1; border: 1px solid var(--border); padding: 0.6em; position: relative; }
.rmx-panels .rmx-panel .rmx-plabel {
  position: absolute; top: -0.7em; left: 0.6em; background: var(--bg);
  padding: 0 0.4em; color: var(--text-muted); font-weight: bold;
  font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
}

/* ===== Module Tabs (approach2 style) ===== */
.module-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}
.module-tab {
  padding: 0.4em 1em; font-size: 0.85rem; color: var(--text-muted);
  cursor: pointer; user-select: none; text-transform: uppercase;
  letter-spacing: 0.06em; border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 0.4em;
}
.module-tab.active { color: var(--purple); border-bottom-color: var(--purple); font-weight: bold; }
.module-tab:hover { color: var(--text); background: #1a1d2e; }

.module-container { flex: 1; min-height: 0; overflow-y: auto; position: relative; }
.module-card { padding: 1em; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Loading skeleton */
.module-loading { display: flex; flex-direction: column; gap: 0.8em; padding: 1.5em; }
.skel-line {
  height: 0.8em; background: var(--surface-alt); border: 1px solid var(--border-dim);
  animation: skelPulse 1.2s ease-in-out infinite;
}
.skel-line.w60 { width: 60%; }
.skel-line.w80 { width: 80%; }
.skel-line.w40 { width: 40%; }
.skel-line.h2 { height: 1.5em; }
.skel-line.h4 { height: 4em; }
@keyframes skelPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

/* Learn module */
.learn-section { padding: 0.3em 0; }
.learn-section + .learn-section { border-top: 1px solid var(--border-dim); padding-top: 0.6em; margin-top: 0.3em; }
.ls-label {
  font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 0.4em;
}
.ls-body { font-size: 0.9rem; line-height: 1.6; color: var(--text); }
.ls-mnemonic { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5em; }

/* Quiz module */
.quiz-q { font-size: 0.95rem; font-weight: bold; margin-bottom: 0.6em; }
.quiz-opt {
  display: flex; align-items: center; gap: 0.5em; padding: 0.4em 0.6em;
  cursor: pointer; font-size: 0.85rem; border: 1px solid var(--border-dim);
  margin-bottom: 0.3em; transition: border-color 0.15s;
}
.quiz-opt:hover { border-color: var(--border); background: #1a1d2e; }
.quiz-opt .qo-letter { color: var(--text-muted); font-weight: bold; min-width: 1.5em; }
.quiz-opt.correct { border-color: var(--green); background: #0f2a1a; }
.quiz-opt.correct .qo-letter { color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: #2a0f0f; }
.quiz-opt.wrong .qo-letter { color: var(--red); }
.quiz-counter { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.3em; }
.quiz-result { font-size: 0.85rem; margin-top: 0.3em; }
.quiz-result.pass { color: var(--green); }
.quiz-result.fail { color: var(--red); }
.quiz-btn {
  background: var(--purple); color: #fff; border: none;
  font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer; font-weight: bold;
  margin-top: 0.5em;
}
.quiz-btn:hover { opacity: 0.85; }
.quiz-btn.alt { background: var(--surface-alt); color: var(--text-muted); }

/* Code module */
.code-prompt { font-weight: bold; font-size: 0.9rem; margin-bottom: 0.5em; }
.code-editor {
  background: var(--surface); border: 1px solid var(--border-dim);
  padding: 0.6em; font-size: 0.85rem; font-family: var(--font-mono);
  min-height: 5em; white-space: pre-wrap; color: var(--text-dim);
  margin-bottom: 0.4em;
}
.code-out {
  background: var(--surface-alt); border: 1px solid var(--border-dim);
  padding: 0.5em; font-size: 0.85rem; margin-top: 0.3em; min-height: 2em;
  color: var(--text-muted); white-space: pre-wrap;
}
.code-out.solution { border-color: var(--purple); color: var(--cyan); }

/* Flashcards module */
.fc-card {
  border: 2px solid var(--border); padding: 2em 1.5em;
  min-height: 8em; cursor: pointer; display: flex;
  align-items: center; justify-content: center; text-align: center;
  font-size: 1.1rem; user-select: none; background: var(--surface);
  transition: border-color 0.2s;
}
.fc-card:hover { border-color: var(--purple); }
.fc-card .fc-front { color: var(--text); }
.fc-card .fc-back { color: var(--cyan); }
.fc-card.flipped { border-color: var(--cyan); }
.fc-counter { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 0.4em; }
.fc-hint { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-top: 0.2em; }
.fc-nav { display: flex; gap: 0.5em; justify-content: center; margin-top: 0.6em; }
.fc-btn {
  background: var(--surface-alt); color: var(--text); border: 1px solid var(--border-dim);
  font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 0.06em; padding: 0.3em 0.7em; cursor: pointer;
}
.fc-btn:hover { border-color: var(--purple); color: var(--purple); }
.fc-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--border-dim); color: var(--text-dim); }
.fc-empty { color: var(--text-dim); padding: 1em; text-align: center; font-size: 0.9rem; }
</style>
</head>
<body>
<div id="app">
  <div class="title-bar">
    <span class="tb-center">BruteForce Learning — <span style="color:var(--purple);font-weight:bold">Combined</span> <span style="color:var(--text-dim);font-size:0.85rem">E × Approach 2</span></span>
    <button class="tb-toggle" id="widthToggle">[––]</button>
  </div>

  <div class="header-bar">
    <div class="h-stat"><span class="h-l">course</span> <span class="h-y" id="headerCourse">React</span></div>
    <div class="h-stat"><span class="h-l">lessons</span> <span class="h-g" id="headerDone">6</span><span class="h-s">/</span><span class="h-l" id="headerTotal">12</span></div>
    <div class="h-stat"><span class="h-l">xp today</span> <span class="h-p">120</span><span class="h-s">/</span><span class="h-l">200</span></div>
    <div class="h-stat"><span class="h-l">streak</span> <span class="h-y">10d</span></div>
  </div>

  <div class="main-area" id="mainArea">
    <div class="screen-tabs">
      <div class="screen-tab active">Learn</div>
      <div class="screen-tab">Quiz</div>
      <div class="screen-tab">Code</div>
      <div class="screen-tab">Progress</div>
      <div class="screen-tab">Stats</div>
    </div>
    <div class="screen-content" id="screenContent"></div>
  </div>

  <div class="keybind-bar" id="keybindBar">
    <span class="kb-pos" id="kbPos">1/6</span>
    <span class="kb-key">j</span><span class="kb-action">/</span><span class="kb-key">k</span><span class="kb-action"> navigate tree</span>
    <span class="kb-key">o</span><span class="kb-action"> open/select</span>
    <span class="kb-key">h</span><span class="kb-action">/</span><span class="kb-key">l</span><span class="kb-action"> module tab</span>
  </div>
  <div class="status-bar" id="statusBar">
    <span class="prefix">›</span> Combined variant — select a course to see roadmap, click a lesson for module workspace
  </div>
</div>

<script>
// =====================================================================
// DATA
// =====================================================================
const TREE = [
  { id: 'react', name: 'React', expanded: true,
    children: [
      { id: 'js-basics', name: 'JS Basics', status: 'in_progress', progress: 65, expanded: true,
        children: [
          { id: 'vars-types', name: 'Variables & Types', type: 'lesson', status: 'done', progress: 100 },
          { id: 'functions-scope', name: 'Functions & Scope', type: 'lesson', status: 'done', progress: 100 },
          { id: 'arrays-objects', name: 'Arrays & Objects', type: 'lesson', status: 'in_progress', progress: 60 },
          { id: 'closures', name: 'Closures', type: 'lesson', status: 'available', progress: 0 },
        ] },
      { id: 'usestate', name: 'useState', status: 'locked', progress: 0, expanded: false,
        children: [
          { id: 'what-is-state', name: 'What is state?', type: 'lesson', status: 'locked', progress: 0 },
          { id: 'counter', name: 'Counter exercise', type: 'coding', status: 'locked', progress: 0 },
        ] },
      { id: 'useeffect', name: 'useEffect', status: 'locked', progress: 0, expanded: false,
        children: [
          { id: 'what-are-effects', name: 'What are effects?', type: 'lesson', status: 'locked', progress: 0 },
          { id: 'data-fetching', name: 'Data fetching', type: 'coding', status: 'locked', progress: 0 },
        ] },
    ] },
  { id: 'js', name: 'JavaScript', status: 'available', progress: 40, expanded: false,
    children: [
      { id: 'js-vars', name: 'Variables & Types', type: 'lesson', status: 'done', progress: 100 },
      { id: 'js-funcs', name: 'Functions & Scope', type: 'lesson', status: 'done', progress: 100 },
      { id: 'js-arrays', name: 'Arrays & Objects', type: 'lesson', status: 'done', progress: 100 },
      { id: 'js-closures', name: 'Closures', type: 'lesson', status: 'in_progress', progress: 30 },
      { id: 'js-promises', name: 'Promises & Async', type: 'lesson', status: 'locked', progress: 0 },
    ] },
  { id: 'git', name: 'Git', status: 'locked', progress: 0, expanded: false,
    children: [
      { id: 'git-basics', name: 'Git Basics', type: 'lesson', status: 'locked', progress: 0 },
      { id: 'git-branching', name: 'Branching & Merging', type: 'lesson', status: 'locked', progress: 0 },
    ] },
  { id: 'node', name: 'Node.js', status: 'locked', progress: 0, expanded: false,
    children: [
      { id: 'node-intro', name: 'Node.js Intro', type: 'lesson', status: 'locked', progress: 0 },
    ] },
];

function calcNodeStatus(node) {
  if (node.children) {
    const all = node.children.map(c => calcNodeStatus(c));
    const statuses = all.map(a => a.status);
    if (statuses.every(s => s === 'done')) return { ...node, status: 'done', progress: 100 };
    if (statuses.some(s => s === 'in_progress' || s === 'done')) return { ...node, status: 'in_progress', progress: Math.round(all.reduce((s, n) => s + n.progress, 0) / all.length) };
    return { ...node, status: 'locked', progress: 0 };
  }
  return node;
}

const DATA = TREE.map(n => calcNodeStatus(n));

const STAT_ICONS = { locked: '◌', available: '○', in_progress: '▶', done: '●' };
const STAT_CLS = { locked: 'si-locked', available: 'si-available', in_progress: 'si-progress', done: 'si-done' };

// =====================================================================
// STATE
// =====================================================================
let state = {
  selectedNodeId: 'react',     // can be course or leaf
  activeModule: 'learn',        // learn | quiz | code | flashcards
};

function getAllNodeIds(nodes) {
  let ids = [];
  for (const n of nodes) {
    ids.push(n.id);
    if (n.children) ids = ids.concat(getAllNodeIds(n.children));
  }
  return ids;
}

const ALL_NODE_IDS = getAllNodeIds(DATA);

function findNode(id, nodes) {
  nodes = nodes || DATA;
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(id, n.children); if (f) return f; }
  }
  return null;
}

function isCourseNode(node) {
  return node && node.children && node.children.length > 0;
}

function getCourseParent(id, nodes) {
  if (!nodes) nodes = DATA;
  for (const n of nodes) {
    if (n.children) {
      if (n.children.some(c => c.id === id)) return n;
      const f = getCourseParent(id, n.children);
      if (f) return f;
    }
  }
  return null;
}

function getCurrentLesson(course) {
  if (!course || !course.children) return null;
  return course.children.find(c => c.status === 'in_progress') ||
         course.children.find(c => c.status === 'available') ||
         course.children[0] || null;
}

// =====================================================================
// TREE RENDER (variant D/E style)
// =====================================================================
function icon(n) {
  if (n.children) {
    if (n.status === 'done') return '<span class="si-done">●</span>';
    if (n.status === 'in_progress') return '<span class="si-progress">▶</span>';
    return '<span class="si-locked">◌</span>';
  }
  return `<span class="${STAT_CLS[n.status]}">${STAT_ICONS[n.status]}</span>`;
}

function renderTree(nodes, depth) {
  let html = '<ul class="tree-list">';
  for (const n of nodes) {
    const hasChildren = n.children && n.children.length > 0;
    const isSel = n.id === state.selectedNodeId;
    const selCls = isSel ? (hasChildren ? ' sel-course' : ' selected') : '';
    html += '<li class="tree-item' + (!hasChildren ? ' tree-leaf' : '') + '">';
    html += '<div class="tree-item-content' + selCls + '" data-id="' + n.id + '">';
    if (hasChildren) {
      html += '<span class="ti-expand" data-toggle="' + n.id + '">' + (n.expanded ? '▼' : '▶') + '</span>';
    } else {
      html += '<span class="ti-expand" style="visibility:hidden">▶</span>';
    }
    html += '<span class="ti-icon">' + icon(n) + '</span>';
    html += '<span class="ti-name">' + n.name + '</span>';

    html += '</div>';
    if (hasChildren && n.expanded) {
      html += '<div class="tree-children">' + renderTree(n.children, depth + 1) + '</div>';
    }
    html += '</li>';
  }
  html += '</ul>';
  return html;
}

// =====================================================================
// STREAK CALENDAR
// =====================================================================
function renderStreakCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const today = now.getDate();

  let html = '<div class="streak-calendar">';
  html += '<div class="sc-header">';
  html += '<span class="sc-month">' + now.toLocaleString('en', { month: 'long' }) + '</span>';
  html += '<span class="sc-year">' + year + '</span>';
  html += '<span class="sc-streak">🔥 10d streak</span>';
  html += '</div>';

  html += '<table class="sc-table"><tr>';
  const headers = ['S','M','T','W','T','F','S'];
  for (const h of headers) html += '<th>' + h + '</th>';
  html += '</tr>';

  let day = 1;
  for (let w = 0; w < 6; w++) {
    html += '<tr>';
    for (let d = 0; d < 7; d++) {
      if ((w === 0 && d < firstDay) || day > daysInMonth) {
        html += '<td></td>';
      } else {
        const dow = d;
        const weekend = dow === 0 || dow === 6;
        let cls = 'sc-day-num';
        if (day === today) cls += ' sc-today';
        else if (day < today) cls += ' sc-filled';
        else cls += ' sc-future';
        if (weekend) cls += ' sc-weekend';
        html += '<td class="' + cls + '">' + day + '</td>';
        day++;
      }
    }
    html += '</tr>';
    if (day > daysInMonth) break;
  }
  html += '</table>';

  html += '<div class="sc-legend">';
  html += '<span class="sc-l-box light"></span><span>done</span>';
  html += '<span class="sc-l-box full"></span><span>today</span>';
  html += '</div></div>';
  return html;
}

function renderHelpingContent() {
  let html = '<div class="help-content">';
  html += '<div class="help-row"><span class="hr-label">next review</span><span style="color:var(--yellow);font-weight:bold">closures — 30 min</span></div>';
  html += '<div class="help-row"><span class="hr-label">focus area</span><span style="color:var(--cyan);font-weight:bold">JS Basics (65%)</span></div>';
  html += '<div class="help-row"><span class="hr-label">weekly goal</span><span style="color:var(--text);font-weight:bold">5 lessons</span><span style="color:var(--text-muted);font-size:0.8rem">(3 done)</span></div>';
  html += '</div>';
  return html;
}

// =====================================================================
// ROADMAP (variant E style)
// =====================================================================
function renderRoadmap(course) {
  const children = course.children || [];
  const done = children.filter(c => {
    if (c.children) return c.children.every(cc => cc.status === 'done');
    return c.status === 'done';
  }).length;
  const total = children.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const current = getCurrentLesson(course);
  const upcoming = children.filter(c => c.status !== 'done');

  let html = '<div class="roadmap-outer">';
  html += '<div class="rm-header">';
  html += '<div class="rm-course">' + course.name + '</div>';
  html += '<div class="rm-progress">' + done + '/' + total + ' lessons · ' + pct + '%</div>';
  html += '<div class="rm-progress-bar"><div class="rm-pb-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  if (current) {
    html += '<div class="rm-current">';
    html += '<div class="rm-curr-label">Continue</div>';
    html += '<div class="rm-curr-name">' + current.name + '</div>';
    html += '<div class="rm-curr-desc">' + (current.type === 'lesson' ? 'Read notes and complete the quiz' : 'Write code to solve the challenge') + '</div>';
    html += '<div class="rm-curr-actions">';
    html += '<button class="rm-btn" data-action="open-lesson" data-id="' + current.id + '">Start</button>';
    html += '<button class="rm-btn rm-btn-outline" data-action="open-lesson" data-id="' + current.id + '">Review Notes</button>';
    html += '</div></div>';
  }

  html += '<div class="rmx-panels">';
  html += '<div class="rmx-panel"><div class="rmx-plabel">Streak</div>' + renderStreakCalendar() + '</div>';
  html += '<div class="rmx-panel"><div class="rmx-plabel">Helping Hand</div>' + renderHelpingContent() + '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}

    html += '<div class="module-tab' + active + '" data-module="' + id + '">' + meta.icon + ' ' + meta.label + '</div>';
  }
  html += '</div>';
  return html;
}

function _renderLoading() {
  return '<div class="module-loading"><div class="skel-line w60 h2"></div><div class="skel-line w80"></div><div class="skel-line w40"></div><div class="skel-line h4"></div><div class="skel-line w80"></div></div>';
}

async function _loadModule(lessonId) {
  const container = document.getElementById('moduleContainer');
  if (!container) return;

  if (!lessonId) {
    container.innerHTML = '<div class="module-card fc-empty">Select a lesson</div>';
    return;
  }

  let html;
  try {
    switch (state.activeModule) {
      case 'learn': html = await LearnContent.load(lessonId); break;
      case 'quiz': html = await QuizContent.load(lessonId); break;
      case 'code': html = await CodeContent.load(lessonId); break;
      case 'flashcards': html = await FlashcardsContent.load(lessonId); break;
      default: html = await LearnContent.load(lessonId);
    }
  } catch (e) {
    html = '<div class="module-card" style="color:var(--red)">Error loading module.</div>';
  }
  container.innerHTML = html;
  _bindModuleActions();
}

function loadCurrentModule() {
  const node = findNode(state.selectedNodeId);
  const isCourse = isCourseNode(node);
  const lessonId = isCourse ? (getCurrentLesson(node) || { id: null }).id : state.selectedNodeId;
  if (lessonId) {
    _loadModule(lessonId);
  }
}

function _bindTreeEvents() {
  document.querySelectorAll('.tree-item-content').forEach(el => {
    el.addEventListener('click', (e) => {
      const id = el.dataset.id;
      if (e.target.classList.contains('ti-expand')) {
        const toggleId = e.target.dataset.toggle;
        const node = findNode(toggleId);
        if (node) node.expanded = !node.expanded;
        render();
        return;
      }
      state.selectedNodeId = id;
      render();
    });
  });
}

function _bindRoadmapEvents() {
  // "Start" and "Review Notes" buttons
  document.querySelectorAll('[data-action="open-lesson"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.id;
      if (id) {
        state.selectedNodeId = id;
        render();
      }
    });
  });
}

function _bindModuleTabs() {
  document.querySelectorAll('.module-tab').forEach(el => {
    el.addEventListener('click', () => {
      state.activeModule = el.dataset.module;
      render();
    });
  });
}

function _bindModuleActions() {
  // Quiz options
  document.querySelectorAll('.quiz-opt').forEach(el => {
    el.addEventListener('click', () => {
      const lessonId = currentLoadingLesson;
      if (lessonId) QuizContent.handleAction(lessonId, 'quiz-answer', parseInt(el.dataset.idx));
    });
  });

  // All data-action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const lessonId = currentLoadingLesson;
      if (!lessonId) return;

      if (action === 'quiz-next') QuizContent.handleAction(lessonId, 'quiz-next');
      else if (action === 'quiz-done') QuizContent.handleAction(lessonId, 'quiz-done');
      else if (action === 'quiz-retry') QuizContent.handleAction(lessonId, 'quiz-retry');
      else if (action === 'code-run') CodeContent.handleAction(lessonId, 'code-run');
      else if (action === 'code-reveal') CodeContent.handleAction(lessonId, 'code-reveal');
    });
  });

  // Flashcard clicks
  document.querySelectorAll('.fc-card').forEach(el => {
    el.addEventListener('click', () => {
      const lessonId = currentLoadingLesson;
      if (lessonId) FlashcardsContent.handleAction(lessonId, 'fc-flip');
    });
  });

  // Flashcard nav buttons
  document.querySelectorAll('.fc-btn').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = el.dataset.action;
      const lessonId = currentLoadingLesson;
      if (!lessonId) return;
      if (action === 'fc-next') FlashcardsContent.handleAction(lessonId, 'fc-next');
      else if (action === 'fc-prev') FlashcardsContent.handleAction(lessonId, 'fc-prev');
    });
  });
}

// =====================================================================
// HEADER / KEYBINDS
// =====================================================================
function updateHeader() {
  const course = (function findCourse(nodes) {
    for (const n of nodes) {
      if (n.id === state.selectedNodeId) return isCourseNode(n) ? n : null;
      if (n.children) { const f = findCourse(n.children); if (f) return f; }
    }
    return null;
  })(DATA);

  if (course) {
    document.getElementById('headerCourse').textContent = course.name;
    const leaves = [];
    (function walk(n) {
      if (n.children) n.children.forEach(c => walk(c));
      else leaves.push(n);
    })(course);
    const done = leaves.filter(l => l.status === 'done').length;
    document.getElementById('headerDone').textContent = done;
    document.getElementById('headerTotal').textContent = leaves.length;
  }
}

function updateKeybinds() {
  const idx = ALL_NODE_IDS.indexOf(state.selectedNodeId);
  document.getElementById('kbPos').textContent = (idx + 1) + '/' + ALL_NODE_IDS.length;

  const node = findNode(state.selectedNodeId);
  const label = node ? node.name : '—';
  document.getElementById('statusBar').innerHTML =
    '<span class="prefix">›</span> <span style="color:var(--yellow);font-weight:bold">' + label + '</span> [' + state.activeModule + ']' +
    (isCourseNode(node) ? ' <span style="color:var(--text-dim)">— roadmap + modules</span>' : ' <span style="color:var(--text-dim)">— lesson workspace</span>') +
    ' <span style="margin-left:auto;color:var(--text-muted)">COMBINED — E × Approach 2</span>';
}

// =====================================================================
// INIT
// =====================================================================
function init() {
  // Width toggle
  const app = document.getElementById('app');
  const toggle = document.getElementById('widthToggle');
  let wide = localStorage.getItem('tui-wide') === 'true';
  function applyWidth(w) {
    wide = w;
    app.classList.toggle('layout-wide', wide);
    app.classList.toggle('layout-narrow', !wide);
    toggle.textContent = wide ? '[==]' : '[––]';
    localStorage.setItem('tui-wide', wide);
  }
  applyWidth(wide);
  toggle.addEventListener('click', () => applyWidth(!wide));

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;

    const all = ALL_NODE_IDS;
    const cur = all.indexOf(state.selectedNodeId);
    const mods = ['learn', 'quiz', 'code', 'flashcards'];
    const mi = mods.indexOf(state.activeModule);

    if (e.key === 'j' || e.key === 'ArrowDown') { e.preventDefault(); state.selectedNodeId = all[Math.min(cur + 1, all.length - 1)]; render(); }
    if (e.key === 'k' || e.key === 'ArrowUp') { e.preventDefault(); state.selectedNodeId = all[Math.max(cur - 1, 0)]; render(); }
    if (e.key === 'h' || e.key === 'ArrowLeft') { e.preventDefault(); state.activeModule = mods[Math.max(mi - 1, 0)]; render(); }
    if (e.key === 'l' || e.key === 'ArrowRight') { e.preventDefault(); state.activeModule = mods[Math.min(mi + 1, mods.length - 1)]; render(); }
  });

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
